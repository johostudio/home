<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>gallery — joho's studio</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="stylesheet" href="styles/tailwind-prod.css">
  <link rel="stylesheet" href="styles/dot-grid.css">
  <link rel="stylesheet" href="styles/clocks.css">
  <link rel="stylesheet" href="styles/gallery.css">
</head>

<body class="min-h-screen bg-[#071021] text-[#e6eef6]">
  <!-- Dot Grid Background -->
  <div class="dot-grid-wrapper"></div>

  <!-- Self-injecting site header -->
  <script src="scripts/site-header.js"></script>

  <a href="index.html" class="back-btn relative z-10">&#8592; back</a>

  <main class="gallery-main relative z-10">
    <div class="gallery-container">
      <header class="gallery-header">
        <h1>projects</h1>
        <p class="gallery-subtitle">a collection of works across different fields and mediums.</p>
      </header>

      <!-- Category filter pills -->
      <nav class="gallery-filters" id="gallery-filters">
        <button class="filter-pill active" data-filter="all">all</button>
      </nav>

      <!-- Projects grid -->
      <div class="gallery-grid" id="gallery-grid">
        <!-- Projects are injected dynamically from gallery-data.js -->
      </div>
    </div>
  </main>

  <footer class="text-center mt-16 w-full mb-10 relative z-10">
    <small>© <span id="year"></span> joho's studio 昌栢</small>
    <div class="text-sm mt-2">ALL RIGHTS RESERVED. ®</div>
  </footer>

  <script>
    const yearEl = document.getElementById('year');
    if (yearEl) yearEl.textContent = new Date().getFullYear();
  </script>
  <script src="scripts/gallery-data.js"></script>
  <script src="scripts/gallery-render.js"></script>
  <script src="scripts/page-transitions.js"></script>
  <script src="scripts/dot-grid.js"></script>
  <script src="scripts/clocks.js"></script>
</body>

</html>
