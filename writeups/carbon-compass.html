## Description

Integrating sustainability awareness through a navigator, allowing users to track their carbon footprint, identify eco-friendly routes, and understand their city more at every step on their commutes.

## Inspiration

- Our team was inspired by the urgent need for individuals to understand and reduce the environmental impact of daily travel across the city. With urban transport responsible for nearly a quarter of global carbon emissions, we wanted to empower commuters with a stronger understanding and allow them to connect their choices to the larger sustainability acts, such as the UN Sustainable Goals.

## What it does

- Integrating sustainability awareness through a navigator, allowing users to track their carbon footprint, identify eco-friendly routes, and understand their city more at every step on their commutes.

## Challenges we ran into

- Learning the tech stack, getting everyone on board with unfamiliar environments.
- Trying to catch up without a timeline, facing time constraints and forced to make quick judgments.

## What we learned

- Working cohesively as a 4-member team, how to communicate effectively together.
- Learning a new framework, familiarizing with the hackathon-like environment (3/4 are first-time hackers).

## Built With

- axios
- google-directions
- google-maps
- react
- vite
