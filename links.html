  <style>
    .links-icons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 16px;
    }

    .links-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: rgba(230, 238, 246, 0.72);
      text-decoration: none;
      position: relative;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .links-icon:hover,
    .links-icon:focus-visible {
      color: #fff;
      transform: translateY(-1px);
      outline: none;
    }

    .links-icon::after {
      content: attr(data-label);
      position: absolute;
      bottom: calc(100% + 9px);
      left: 50%;
      transform: translate(-50%, 4px);
      font-size: 10px;
      line-height: 1;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
      background: rgba(7, 16, 33, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      padding: 5px 8px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.16s ease, transform 0.16s ease;
    }

    .links-icon:hover::after,
    .links-icon:focus-visible::after {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 640px) {
      .links-icons {
        gap: 12px;
      }

      .links-icon {
        width: 34px;
        height: 34px;
      }
    }
  </style>
</head>
