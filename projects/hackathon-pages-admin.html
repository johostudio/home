<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>hackathon page editor</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <link rel="stylesheet" href="../styles/tailwind-prod.css">
  <link rel="stylesheet" href="../styles/dot-grid.css">
  <link rel="stylesheet" href="../styles/clocks.css">
  <style>
    body {
      background: #071021;
      color: #e6eef6;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .editor-page {
      max-width: 1050px;
      margin: 0 auto;
      padding: 150px 24px 70px;
      position: relative;
      z-index: 10;
    }

    .editor-page h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 500;
      letter-spacing: -0.03em;
      text-transform: lowercase;
    }

    .editor-sub {
      margin-top: 0.4rem;
      color: rgba(194, 205, 221, 0.75);
      font-size: 0.86rem;
    }

    .panel {
      margin-top: 1rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      padding: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.74rem;
      color: rgba(194, 205, 221, 0.9);
      text-transform: lowercase;
      letter-spacing: 0.01em;
    }

    input,
    select,
    textarea {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      color: #e6eef6;
      padding: 0.6rem 0.72rem;
      font-size: 0.86rem;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
      line-height: 1.45;
      font-family: "Courier New", monospace;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      margin-top: 0.9rem;
    }

    button {
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-radius: 8px;
      font-size: 0.8rem;
      padding: 0.55rem 0.85rem;
      cursor: pointer;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    .status {
      margin-top: 0.7rem;
      font-size: 0.8rem;
      color: rgba(194, 205, 221, 0.88);
    }

    .output {
      min-height: 220px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: "Courier New", monospace;
      font-size: 0.8rem;
    }

    .quick-links {
      margin-top: 0.9rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      font-size: 0.8rem;
    }

    .quick-links a {
      color: #d5c0ff;
      text-decoration: none;
      border-bottom: 1px solid rgba(213, 192, 255, 0.3);
    }

    .quick-links a:hover {
      border-bottom-color: #d5c0ff;
    }

    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="min-h-screen">
  <div class="dot-grid-wrapper"></div>
  <script src="../scripts/site-header.js"></script>

  <main class="editor-page">
    <a href="../gallery.html" class="text-white/45 text-sm hover:text-white transition-colors">&larr; back to gallery</a>
    <h1 class="mt-3">hackathon page editor</h1>
    <p class="editor-sub">edit content for the four ui/ux hackathon pages, then copy and paste the generated markdown block into the matching writeup file.</p>

    <section class="panel">
      <div class="grid">
        <div class="field">
          <label for="project-id">project</label>
          <select id="project-id"></select>
        </div>
        <div class="field">
          <label for="title">title</label>
          <input id="title" type="text" />
        </div>
        <div class="field">
          <label for="date">date label</label>
          <input id="date" type="text" placeholder="Feb 2026" />
        </div>
        <div class="field">
          <label for="tag">tag label</label>
          <input id="tag" type="text" placeholder="UI / UX" />
        </div>
        <div class="field full">
          <label for="devpost-url">devpost url</label>
          <input id="devpost-url" type="text" />
        </div>
        <div class="field full">
          <label for="youtube-url">youtube url (optional, for top of project images)</label>
          <input id="youtube-url" type="text" placeholder="https://www.youtube.com/watch?v=..." />
        </div>
        <div class="field full">
          <label for="markdown-content">content markdown (everything before project images)</label>
          <textarea id="markdown-content"></textarea>
        </div>
        <div class="field full">
          <label for="image-urls">project image urls (one per line)</label>
          <textarea id="image-urls"></textarea>
        </div>
      </div>

      <div class="btn-row">
        <button id="save-btn" type="button">save draft</button>
        <button id="reset-btn" type="button">reset project draft</button>
        <button id="generate-btn" type="button">generate markdown block</button>
        <button id="copy-btn" type="button">copy output</button>
      </div>
      <p class="status" id="status"></p>
    </section>

    <section class="panel">
      <label for="output">generated markdown block</label>
      <pre class="output" id="output"></pre>
      <div class="quick-links" id="quick-links"></div>
    </section>
  </main>

  <script>
    (function () {
      var STORAGE_KEY = 'hackathon_page_editor_v1';

      var defaults = {
        verdant: {
          title: 'Verdant',
          date: 'Feb 2026',
          tag: 'UI / UX',
          devpost: 'https://devpost.com/software/verdant-8hf09j',
          youtube: '',
          writeupPath: '../writeups/verdant.html',
          markdown: '## Description\\n\\nAdd your project description and sections here.',
          images: [
            'https://d112y698adiu2z.cloudfront.net/photos/production/software_photos/004/234/847/datas/original.png'
          ]
        },
        'ascend-ai': {
          title: 'ascend.ai - A Personalized Financial Advisor Engine',
          date: 'Jan 2026',
          tag: 'UI / UX',
          devpost: 'https://devpost.com/software/ascend-ai-a-personalized-financial-advisor-engine',
          youtube: '',
          writeupPath: '../writeups/ascend-ai.html',
          markdown: '## Description\\n\\nAdd your project description and sections here.',
          images: [
            'https://d112y698adiu2z.cloudfront.net/photos/production/software_photos/004/175/357/datas/original.png'
          ]
        },
        'carbon-compass': {
          title: 'Carbon Compass',
          date: 'Oct 2025',
          tag: 'UI / UX',
          devpost: 'https://devpost.com/software/carbon-compass-g8djwa',
          youtube: '',
          writeupPath: '../writeups/carbon-compass.html',
          markdown: '## Description\\n\\nAdd your project description and sections here.',
          images: [
            'https://d112y698adiu2z.cloudfront.net/photos/production/software_photos/003/819/511/datas/original.png'
          ]
        },
        bussin: {
          title: 'Bussin!',
          date: 'Feb 2026',
          tag: 'UI / UX',
          devpost: 'https://devpost.com/software/bussin-cgztw6',
          youtube: 'https://www.youtube.com/watch?v=Yw8wcUWkJ7I',
          writeupPath: '../writeups/bussin.html',
          markdown: '## Description\\n\\nAdd your project description and sections here.',
          images: [
            'https://d112y698adiu2z.cloudfront.net/photos/production/software_photos/004/272/295/datas/original.jpg'
          ]
        }
      };

      var projectSelect = document.getElementById('project-id');
      var titleEl = document.getElementById('title');
      var dateEl = document.getElementById('date');
      var tagEl = document.getElementById('tag');
      var devpostEl = document.getElementById('devpost-url');
      var youtubeEl = document.getElementById('youtube-url');
      var markdownEl = document.getElementById('markdown-content');
      var imagesEl = document.getElementById('image-urls');
      var outputEl = document.getElementById('output');
      var statusEl = document.getElementById('status');
      var quickLinksEl = document.getElementById('quick-links');

      function esc(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function readState() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : {};
        } catch (_e) {
          return {};
        }
      }

      function saveState(state) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function setStatus(message) {
        statusEl.textContent = message || '';
      }

      function selectedId() {
        return projectSelect.value;
      }

      function loadProjectValues(id) {
        var state = readState();
        var base = defaults[id];
        var data = state[id] || base;
        titleEl.value = data.title || '';
        dateEl.value = data.date || '';
        tagEl.value = data.tag || '';
        devpostEl.value = data.devpost || '';
        youtubeEl.value = data.youtube || '';
        markdownEl.value = data.markdown || '';
        imagesEl.value = (data.images || []).join('\n');
        outputEl.textContent = '';
        quickLinksEl.innerHTML = '<a href="' + esc(base.writeupPath) + '" target="_blank" rel="noopener">open writeup file</a>';
      }

      function collectProjectValues() {
        return {
          title: titleEl.value.trim(),
          date: dateEl.value.trim(),
          tag: tagEl.value.trim(),
          devpost: devpostEl.value.trim(),
          youtube: youtubeEl.value.trim(),
          markdown: markdownEl.value.trim(),
          images: imagesEl.value
            .split('\n')
            .map(function (line) { return line.trim(); })
            .filter(Boolean)
        };
      }

      function toEmbedUrl(youtubeUrl) {
        if (!youtubeUrl) return '';
        var value = youtubeUrl.trim();
        var shortMatch = value.match(/youtu\.be\/([a-zA-Z0-9_-]+)/);
        if (shortMatch) return 'https://www.youtube.com/embed/' + shortMatch[1];
        var watchMatch = value.match(/[?&]v=([a-zA-Z0-9_-]+)/);
        if (watchMatch) return 'https://www.youtube.com/embed/' + watchMatch[1];
        if (value.indexOf('/embed/') !== -1) return value;
        return '';
      }

      function generateMarkdown(data) {
        var out = [];
        if (data.markdown) out.push(data.markdown);
        out.push('');
        out.push('## Devpost');
        out.push('');
        out.push('- [View project on Devpost](' + data.devpost + ')');
        out.push('');
        out.push('## Project Images');
        out.push('');
        var embed = toEmbedUrl(data.youtube);
        if (embed) {
          out.push('<iframe src="' + embed + '" title="' + data.title + ' demo video" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>');
          out.push('');
        }
        data.images.forEach(function (image, index) {
          out.push('![' + data.title + ' screenshot ' + (index + 1) + '](' + image + ')');
        });
        return out.join('\n');
      }

      function buildProjectOptions() {
        Object.keys(defaults).forEach(function (id) {
          var option = document.createElement('option');
          option.value = id;
          option.textContent = defaults[id].title;
          projectSelect.appendChild(option);
        });
      }

      document.getElementById('save-btn').addEventListener('click', function () {
        var id = selectedId();
        var state = readState();
        state[id] = collectProjectValues();
        saveState(state);
        setStatus('Draft saved for ' + defaults[id].title + '.');
      });

      document.getElementById('reset-btn').addEventListener('click', function () {
        var id = selectedId();
        var state = readState();
        delete state[id];
        saveState(state);
        loadProjectValues(id);
        setStatus('Draft reset for ' + defaults[id].title + '.');
      });

      document.getElementById('generate-btn').addEventListener('click', function () {
        var id = selectedId();
        var data = collectProjectValues();
        outputEl.textContent = generateMarkdown(data);
        setStatus('Markdown block generated for ' + defaults[id].title + '.');
      });

      document.getElementById('copy-btn').addEventListener('click', function () {
        var text = outputEl.textContent || '';
        if (!text) {
          setStatus('Generate output first.');
          return;
        }
        navigator.clipboard.writeText(text).then(function () {
          setStatus('Output copied. Paste into the matching writeup file.');
        }).catch(function () {
          setStatus('Copy failed. You can still select and copy manually.');
        });
      });

      projectSelect.addEventListener('change', function () {
        loadProjectValues(selectedId());
      });

      buildProjectOptions();
      projectSelect.value = 'verdant';
      loadProjectValues('verdant');
    })();
  </script>

  <script src="../scripts/page-transitions.js"></script>
  <script src="../scripts/dot-grid.js"></script>
  <script src="../scripts/clocks.js"></script>
</body>
</html>
