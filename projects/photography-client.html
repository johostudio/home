<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>photography</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <link rel="stylesheet" href="../styles/tailwind-prod.css">
  <link rel="stylesheet" href="../styles/dot-grid.css">
  <link rel="stylesheet" href="../styles/clocks.css">
  <style>
    body {
      background: #071021;
      color: #e6eef6;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .photo-page {
      max-width: 1160px;
      margin: 0 auto;
      padding: 150px 24px 60px;
      position: relative;
      z-index: 10;
    }

    .photo-header h1 {
      margin: 0;
      font-size: clamp(2.45rem, 5.1vw, 3.85rem);
      font-weight: 400;
      letter-spacing: -0.09em;
      text-transform: lowercase;
      line-height: 0.94;
      color: #fff;
    }

    .photo-header p {
      margin-top: 0.65rem;
      font-size: 0.72rem;
      letter-spacing: -0.01em;
      text-transform: lowercase;
      color: rgba(190, 198, 214, 0.52);
      line-height: 1.5;
    }

    .photo-grid {
      margin-top: 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 1.35rem;
      justify-items: center;
    }

    .photo-card {
      width: min(250px, 100%);
      background: #f7f7f2;
      border-radius: 2px;
      border: 1px solid rgba(0, 0, 0, 0.12);
      padding: 10px 10px 18px;
      box-shadow: 0 18px 28px rgba(0, 0, 0, 0.35);
      transform-origin: center center;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }

    .photo-card:hover {
      transform: translateY(-4px) rotate(0deg) !important;
      box-shadow: 0 26px 34px rgba(0, 0, 0, 0.42);
    }

    .photo-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      background: #d8d8d1;
      border: 1px solid rgba(0, 0, 0, 0.1);
    }

    .photo-note {
      padding: 0.65rem 0.45rem 0;
    }

    .photo-note .meta {
      font-size: 0.72rem;
      letter-spacing: -0.01em;
      text-transform: lowercase;
      color: rgba(17, 17, 17, 0.86);
      margin-bottom: 0;
      font-weight: 400;
    }

    .photo-status {
      margin-top: 1rem;
      font-size: 0.76rem;
      color: rgba(190, 198, 214, 0.72);
      text-transform: lowercase;
    }
  </style>
</head>

<body class="min-h-screen">
  <div class="dot-grid-wrapper"></div>
  <script src="../scripts/site-header.js"></script>

  <main class="photo-page">
    <a href="../gallery.html" class="text-white/45 text-sm hover:text-white transition-colors">← back to gallery</a>

    <header class="photo-header mt-4">
      <h1>photography</h1>
      <p>photo gallery. edit `projects/photography-client-data.json` to add photos, dates, and locations.</p>
      <p>use `file` for local images in `projects/photography-client-images/`, or `image` for full URLs.</p>
      <p class="photo-status" id="photo-status" hidden></p>
    </header>

    <section class="photo-grid" id="photo-grid"></section>
  </main>

  <script>
    (function () {
      var grid = document.getElementById('photo-grid');
      var status = document.getElementById('photo-status');
      var localImagePrefix = './photography-client-images/';

      function esc(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function setStatus(message) {
        if (!status) return;
        if (!message) {
          status.hidden = true;
          status.textContent = '';
          return;
        }
        status.hidden = false;
        status.textContent = message;
      }

      function resolveImage(entry) {
        if (!entry || typeof entry !== 'object') return '';
        var direct = typeof entry.image === 'string' ? entry.image.trim() : '';
        if (direct) return direct;
        var file = typeof entry.file === 'string' ? entry.file.trim() : '';
        if (!file) return '';
        return localImagePrefix + encodeURI(file);
      }

      function render(entries) {
        var list = Array.isArray(entries) ? entries.map(function (entry) {
          return {
            image: resolveImage(entry),
            date: entry && entry.date ? entry.date : '',
            location: entry && entry.location ? entry.location : ''
          };
        }).filter(function (entry) {
          return !!entry.image;
        }) : [];

        if (!list.length) {
          grid.innerHTML = '';
          setStatus('no photos yet. add entries to projects/photography-client-data.json');
          return;
        }

        var rotations = [-3.4, 2.1, -1.6, 3.2, -2.4, 1.2, -2.9, 2.6];
        grid.innerHTML = list.map(function (entry, index) {
          var tilt = rotations[index % rotations.length];
          return [
            '<article class="photo-card" style="transform: rotate(', tilt, 'deg);">',
            '<img src="', esc(entry.image), '" alt="photo" loading="lazy" decoding="async">',
            '<div class="photo-note">',
            '<div class="meta">', esc(entry.date || 'date tbd'), ' @ ', esc(entry.location || 'location tbd'), '</div>',
            '</div>',
            '</article>'
          ].join('');
        }).join('');

        setStatus('');
      }

      fetch('./photography-client-data.json', { cache: 'no-store' })
        .then(function (res) {
          if (!res.ok) throw new Error('failed to load gallery data');
          return res.json();
        })
        .then(function (entries) {
          render(entries);
        })
        .catch(function () {
          render([]);
          setStatus('could not load data file. check projects/photography-client-data.json');
        });
    })();
  </script>

  <script src="../scripts/page-transitions.js"></script>
  <script src="../scripts/dot-grid.js"></script>
  <script src="../scripts/clocks.js"></script>
</body>

</html>
