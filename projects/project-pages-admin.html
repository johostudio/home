<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>project page admin</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <link rel="stylesheet" href="../styles/tailwind-prod.css">
  <link rel="stylesheet" href="../styles/dot-grid.css">
  <link rel="stylesheet" href="../styles/clocks.css">
  <style>
    body { background: #071021; color: #e6eef6; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
    .page { max-width: 1060px; margin: 0 auto; padding: 150px 24px 70px; position: relative; z-index: 10; }
    h1 { margin: 0; font-size: clamp(2rem, 4vw, 3rem); font-weight: 500; letter-spacing: -0.04em; text-transform: lowercase; }
    .sub { margin-top: 0.45rem; font-size: 0.84rem; color: rgba(194, 205, 221, 0.78); }
    .card { margin-top: 1rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 1rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .full { grid-column: 1 / -1; }
    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    label { font-size: 0.73rem; color: rgba(194,205,221,0.9); text-transform: lowercase; }
    input, select, textarea {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 8px;
      color: #e6eef6;
      padding: 0.62rem 0.72rem;
      font-size: 0.85rem;
    }
    textarea { min-height: 130px; resize: vertical; font-family: "Courier New", monospace; line-height: 1.45; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 0.55rem; margin-top: 0.9rem; }
    button {
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      border-radius: 8px;
      font-size: 0.8rem;
      padding: 0.55rem 0.85rem;
      cursor: pointer;
    }
    button:hover { background: rgba(255,255,255,0.16); }
    .status { margin-top: 0.65rem; font-size: 0.8rem; color: rgba(194,205,221,0.9); }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
      font-size: 0.8rem;
      line-height: 1.5;
      font-family: "Courier New", monospace;
      min-height: 180px;
    }
    .out-title { font-size: 0.78rem; margin-bottom: 0.45rem; color: rgba(194,205,221,0.85); text-transform: lowercase; }
    @media (max-width: 840px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="min-h-screen">
  <div class="dot-grid-wrapper"></div>
  <script src="../scripts/site-header.js"></script>

  <main class="page">
    <a href="../gallery.html" class="text-white/45 text-sm hover:text-white transition-colors">&larr; back to gallery</a>
    <h1 class="mt-3">project page admin</h1>
    <p class="sub">create/edit project entries for any category. this generates ready-to-paste snippets for <code>scripts/gallery-data.js</code> and writeup markdown.</p>

    <section class="card">
      <div class="grid">
        <div class="field">
          <label for="title">project title</label>
          <input id="title" type="text" placeholder="my project title" />
        </div>
        <div class="field">
          <label for="slug">slug</label>
          <input id="slug" type="text" placeholder="my-project-slug" />
        </div>

        <div class="field">
          <label for="category">category</label>
          <select id="category">
            <option value="engineering">engineering</option>
            <option value="graphic-design">graphic design</option>
            <option value="brand-design">brand design</option>
            <option value="ui-ux">ui / ux</option>
            <option value="videography">videography</option>
            <option value="photography">photography</option>
            <option value="production">production</option>
            <option value="motion-graphics">motion graphics</option>
            <option value="illustration">illustration</option>
            <option value="urban-architecture">urban+architecture</option>
            <option value="diy-projects">diy projects</option>
            <option value="misc">misc</option>
          </select>
        </div>
        <div class="field">
          <label for="date">date (yyyy-mm)</label>
          <input id="date" type="text" placeholder="2026-05" />
        </div>

        <div class="field full">
          <label for="description">gallery card description</label>
          <input id="description" type="text" placeholder="short gallery card description" />
        </div>

        <div class="field">
          <label for="thumb">thumbnail url/path (optional)</label>
          <input id="thumb" type="text" placeholder="https://... or gif/thumbnails/..." />
        </div>
        <div class="field">
          <label for="href">custom href (optional)</label>
          <input id="href" type="text" placeholder="projects/custom-page (optional)" />
        </div>

        <div class="field full">
          <label for="page-title">writeup page h1 title</label>
          <input id="page-title" type="text" placeholder="project page title" />
        </div>
        <div class="field">
          <label for="page-date">writeup date label</label>
          <input id="page-date" type="text" placeholder="May 2026" />
        </div>
        <div class="field">
          <label for="page-tag">writeup tag label</label>
          <input id="page-tag" type="text" value="UI / UX" />
        </div>

        <div class="field full">
          <label for="body-md">writeup body markdown (before devpost/images)</label>
          <textarea id="body-md" placeholder="## Description&#10;&#10;..."></textarea>
        </div>

        <div class="field full">
          <label for="devpost">devpost link (optional)</label>
          <input id="devpost" type="text" placeholder="https://devpost.com/software/..." />
        </div>
        <div class="field full">
          <label for="youtube">youtube link (optional)</label>
          <input id="youtube" type="text" placeholder="https://www.youtube.com/watch?v=..." />
        </div>
        <div class="field full">
          <label for="images">image urls (one per line)</label>
          <textarea id="images" placeholder="https://.../image1.png&#10;https://.../image2.png"></textarea>
        </div>
      </div>

      <div class="btn-row">
        <button id="generate-btn" type="button">generate snippets</button>
        <button id="copy-gallery-btn" type="button">copy gallery entry</button>
        <button id="copy-writeup-btn" type="button">copy writeup markdown</button>
        <button id="save-draft-btn" type="button">save draft</button>
        <button id="reset-btn" type="button">reset</button>
      </div>
      <p class="status" id="status"></p>
    </section>

    <section class="card">
      <div class="out-title">gallery-data.js entry snippet</div>
      <pre id="gallery-output"></pre>
    </section>

    <section class="card">
      <div class="out-title">writeup markdown block snippet</div>
      <pre id="writeup-output"></pre>
    </section>
  </main>

  <script>
    (function () {
      var KEY = 'project_page_admin_v1';
      var statusEl = document.getElementById('status');
      var galleryOut = document.getElementById('gallery-output');
      var writeupOut = document.getElementById('writeup-output');

      var fields = {
        title: document.getElementById('title'),
        slug: document.getElementById('slug'),
        category: document.getElementById('category'),
        date: document.getElementById('date'),
        description: document.getElementById('description'),
        thumb: document.getElementById('thumb'),
        href: document.getElementById('href'),
        pageTitle: document.getElementById('page-title'),
        pageDate: document.getElementById('page-date'),
        pageTag: document.getElementById('page-tag'),
        bodyMd: document.getElementById('body-md'),
        devpost: document.getElementById('devpost'),
        youtube: document.getElementById('youtube'),
        images: document.getElementById('images')
      };

      function setStatus(message) { statusEl.textContent = message || ''; }
      function escSingle(value) { return String(value || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }

      function loadDraft() {
        try {
          var raw = localStorage.getItem(KEY);
          if (!raw) return;
          var data = JSON.parse(raw);
          Object.keys(fields).forEach(function (k) {
            if (typeof data[k] !== 'undefined') fields[k].value = data[k];
          });
        } catch (_e) {}
      }

      function saveDraft() {
        var data = {};
        Object.keys(fields).forEach(function (k) { data[k] = fields[k].value; });
        localStorage.setItem(KEY, JSON.stringify(data));
      }

      function getData() {
        var out = {};
        Object.keys(fields).forEach(function (k) { out[k] = (fields[k].value || '').trim(); });
        out.imagesList = out.images.split('\n').map(function (line) { return line.trim(); }).filter(Boolean);
        return out;
      }

      function toEmbed(url) {
        if (!url) return '';
        var short = url.match(/youtu\.be\/([a-zA-Z0-9_-]+)/);
        if (short) return 'https://www.youtube.com/embed/' + short[1];
        var watch = url.match(/[?&]v=([a-zA-Z0-9_-]+)/);
        if (watch) return 'https://www.youtube.com/embed/' + watch[1];
        if (url.indexOf('/embed/') !== -1) return url;
        return '';
      }

      function generate() {
        var d = getData();
        var lines = [];
        lines.push('{');
        lines.push("  slug: '" + escSingle(d.slug) + "',");
        lines.push("  title: '" + escSingle(d.title) + "',");
        lines.push("  category: '" + escSingle(d.category) + "',");
        lines.push("  date: '" + escSingle(d.date) + "',");
        lines.push("  description: '" + escSingle(d.description) + "',");
        lines.push("  thumb: " + (d.thumb ? "'" + escSingle(d.thumb) + "'" : 'null') + (d.href ? ',' : ''));
        if (d.href) lines.push("  href: '" + escSingle(d.href) + "'");
        lines.push('}');
        galleryOut.textContent = lines.join('\n');

        var md = [];
        md.push(d.bodyMd || '## Description\n\nAdd project description here.');
        if (d.devpost) {
          md.push('');
          md.push('## Devpost');
          md.push('');
          md.push('- [View project on Devpost](' + d.devpost + ')');
        }
        if (d.imagesList.length || d.youtube) {
          md.push('');
          md.push('## Project Images');
          md.push('');
          var embed = toEmbed(d.youtube);
          if (embed) {
            md.push('<iframe src="' + embed + '" title="' + (d.pageTitle || d.title) + ' demo video" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>');
            md.push('');
          }
          d.imagesList.forEach(function (img, idx) {
            md.push('![' + (d.pageTitle || d.title) + ' screenshot ' + (idx + 1) + '](' + img + ')');
          });
        }
        writeupOut.textContent = md.join('\n');
      }

      document.getElementById('generate-btn').addEventListener('click', function () {
        generate();
        setStatus('Snippets generated.');
      });
      document.getElementById('copy-gallery-btn').addEventListener('click', function () {
        if (!galleryOut.textContent) generate();
        navigator.clipboard.writeText(galleryOut.textContent).then(function () {
          setStatus('Gallery entry copied.');
        }).catch(function () {
          setStatus('Copy failed. Select text manually.');
        });
      });
      document.getElementById('copy-writeup-btn').addEventListener('click', function () {
        if (!writeupOut.textContent) generate();
        navigator.clipboard.writeText(writeupOut.textContent).then(function () {
          setStatus('Writeup markdown copied.');
        }).catch(function () {
          setStatus('Copy failed. Select text manually.');
        });
      });
      document.getElementById('save-draft-btn').addEventListener('click', function () {
        saveDraft();
        setStatus('Draft saved in browser.');
      });
      document.getElementById('reset-btn').addEventListener('click', function () {
        localStorage.removeItem(KEY);
        Object.keys(fields).forEach(function (k) { fields[k].value = ''; });
        fields.category.value = 'ui-ux';
        fields.pageTag.value = 'UI / UX';
        galleryOut.textContent = '';
        writeupOut.textContent = '';
        setStatus('Draft reset.');
      });

      loadDraft();
      if (!fields.category.value) fields.category.value = 'ui-ux';
      if (!fields.pageTag.value) fields.pageTag.value = 'UI / UX';
    })();
  </script>

  <script src="../scripts/page-transitions.js"></script>
  <script src="../scripts/dot-grid.js"></script>
  <script src="../scripts/clocks.js"></script>
</body>
</html>
