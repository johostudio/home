<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>photography admin</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <link rel="stylesheet" href="../styles/tailwind-prod.css">
  <link rel="stylesheet" href="../styles/dot-grid.css">
  <link rel="stylesheet" href="../styles/clocks.css">
  <style>
    body {
      background: #071021;
      color: #e6eef6;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .admin-page {
      max-width: 900px;
      margin: 0 auto;
      padding: 150px 24px 80px;
      position: relative;
      z-index: 10;
    }

    .admin-page h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 600;
    }

    .admin-sub {
      color: rgba(190, 198, 214, 0.75);
      font-size: 0.9rem;
      margin-top: 0.4rem;
    }

    .admin-card {
      margin-top: 1.4rem;
      padding: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
    }

    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.85rem;
    }

    .admin-field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .admin-field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.75rem;
      color: rgba(190, 198, 214, 0.9);
      text-transform: lowercase;
    }

    input[type="text"],
    input[type="date"],
    input[type="password"],
    input[type="file"],
    textarea {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      color: #e6eef6;
      padding: 0.6rem 0.7rem;
      font-size: 0.9rem;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      font-family: "Courier New", monospace;
      line-height: 1.5;
    }

    .btn {
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      font-size: 0.82rem;
      cursor: pointer;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    .status {
      margin-top: 0.7rem;
      font-size: 0.82rem;
      color: rgba(190, 198, 214, 0.92);
    }

    .photo-list {
      margin-top: 1rem;
      display: grid;
      gap: 0.7rem;
    }

    .photo-row {
      display: grid;
      grid-template-columns: 70px 1fr auto;
      gap: 0.65rem;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      padding: 0.45rem;
      background: rgba(255, 255, 255, 0.03);
    }

    .photo-row img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .photo-meta {
      font-size: 0.82rem;
      color: rgba(220, 228, 241, 0.95);
    }

    .photo-sub {
      font-size: 0.74rem;
      color: rgba(190, 198, 214, 0.75);
      margin-top: 0.2rem;
      word-break: break-all;
    }

    .meta-edit {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.45rem;
      margin-top: 0.45rem;
    }

    .meta-edit input {
      padding: 0.38rem 0.5rem;
      font-size: 0.78rem;
    }

    .row-actions {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    @media (max-width: 760px) {
      .admin-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body class="min-h-screen">
  <div class="dot-grid-wrapper"></div>
  <script src="../scripts/site-header.js"></script>
  <script src="../scripts/cloudflare-config.js"></script>

  <main class="admin-page">
    <a href="./photography-client.html" class="text-white/50 text-sm hover:text-white transition-colors">← view gallery</a>
    <h1 class="mt-3">photography admin</h1>
    <p class="admin-sub">upload images to cloudflare r2 + store date/location in d1.</p>

    <section class="admin-card">
      <div class="admin-grid">
        <div class="admin-field full">
          <label for="admin-token">admin token</label>
          <input id="admin-token" type="password" placeholder="PHOTOGRAPHY_ADMIN_TOKEN value" autocomplete="off" />
        </div>
        <div class="admin-field full">
          <label for="photo-file">photo file</label>
          <input id="photo-file" type="file" accept="image/*" multiple />
        </div>
        <div class="admin-field">
          <label for="photo-date">date</label>
          <input id="photo-date" type="date" />
        </div>
        <div class="admin-field">
          <label for="photo-location">location</label>
          <input id="photo-location" type="text" placeholder="Vancouver, BC" />
        </div>
      </div>
      <div class="mt-3 flex gap-2">
        <button class="btn" id="upload-btn" type="button">upload selected files</button>
        <button class="btn" id="refresh-btn" type="button">refresh list</button>
      </div>
      <p class="status" id="admin-status"></p>

      <div class="admin-field full mt-3">
        <label for="bulk-json">batch import old photos (one per line: image_url | YYYY-MM-DD | Location)</label>
        <textarea id="bulk-json" placeholder="https://example.com/photo1.jpg | 2026-05-13 | Vancouver, BC&#10;https://example.com/photo2.jpg | 2026-05-14 | Burnaby, BC"></textarea>
      </div>
      <div class="mt-3 flex gap-2">
        <button class="btn" id="bulk-import-btn" type="button">import url batch</button>
        <button class="btn" id="import-local-btn" type="button">import current local JSON</button>
      </div>

      <div class="photo-list" id="photo-list"></div>
    </section>
  </main>

  <script>
    (function () {
      var tokenEl = document.getElementById('admin-token');
      var fileEl = document.getElementById('photo-file');
      var dateEl = document.getElementById('photo-date');
      var locationEl = document.getElementById('photo-location');
      var uploadBtn = document.getElementById('upload-btn');
      var refreshBtn = document.getElementById('refresh-btn');
      var bulkEl = document.getElementById('bulk-json');
      var bulkImportBtn = document.getElementById('bulk-import-btn');
      var importLocalBtn = document.getElementById('import-local-btn');
      var statusEl = document.getElementById('admin-status');
      var listEl = document.getElementById('photo-list');
      var workerUrl = (window.CLOUDFLARE_WORKER_URL || '').replace(/\/$/, '');

      function setStatus(message) {
        statusEl.textContent = message || '';
      }

      function esc(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function token() {
        return (tokenEl.value || '').trim();
      }

      function ensureConfig() {
        if (!workerUrl) {
          setStatus('CLOUDFLARE_WORKER_URL is missing. Check scripts/cloudflare-config.js');
          return false;
        }
        return true;
      }

      function persistToken() {
        localStorage.setItem('photo_admin_token', token());
      }

      function loadPersistedToken() {
        var saved = localStorage.getItem('photo_admin_token') || '';
        tokenEl.value = saved;
      }

      function renderList(rows) {
        if (!Array.isArray(rows) || !rows.length) {
          listEl.innerHTML = '<p class="admin-sub">no photos in database yet.</p>';
          return;
        }

        listEl.innerHTML = rows.map(function (row) {
          var date = row.shoot_date || row.date || 'date tbd';
          var location = row.location || 'location tbd';
          return [
            '<article class="photo-row">',
            '<img src="', esc(row.image_url), '" alt="photo" loading="lazy">',
            '<div>',
            '<div class="photo-meta">', esc(date), ' @ ', esc(location), '</div>',
            '<div class="photo-sub">', esc(row.id), '</div>',
            '<div class="meta-edit">',
            '<input type="date" data-edit-date-id="', esc(row.id), '" value="', esc(date), '">',
            '<input type="text" data-edit-location-id="', esc(row.id), '" value="', esc(location), '" placeholder="location">',
            '</div>',
            '</div>',
            '<div class="row-actions">',
            '<button class="btn" data-save-id="', esc(row.id), '" data-image-url="', esc(row.image_url), '">save</button>',
            '<button class="btn" data-delete-id="', esc(row.id), '">delete</button>',
            '</div>',
            '</article>'
          ].join('');
        }).join('');
      }

      function fetchPhotos() {
        if (!ensureConfig()) return;
        setStatus('loading photos...');
        fetch(workerUrl + '/client-photos', { cache: 'no-store' })
          .then(function (res) {
            if (!res.ok) throw new Error('failed to load photos');
            return res.json();
          })
          .then(function (rows) {
            renderList(rows);
            setStatus('loaded ' + rows.length + ' photo(s).');
          })
          .catch(function () {
            setStatus('could not load photos from worker.');
          });
      }

      async function uploadPhoto() {
        if (!ensureConfig()) return;
        var adminToken = token();
        if (!adminToken) {
          setStatus('admin token is required.');
          return;
        }
        if (!fileEl.files || !fileEl.files.length) {
          setStatus('choose one or more photo files first.');
          return;
        }
        var shootDate = (dateEl.value || '').trim();
        var location = (locationEl.value || '').trim();
        if (!shootDate || !location) {
          setStatus('date and location are required.');
          return;
        }

        persistToken();

        var files = Array.from(fileEl.files);
        var uploaded = 0;
        var failed = 0;

        for (var i = 0; i < files.length; i++) {
          var form = new FormData();
          form.append('file', files[i]);
          form.append('date', shootDate);
          form.append('location', location);

          setStatus('uploading ' + (i + 1) + ' / ' + files.length + '...');
          try {
            var res = await fetch(workerUrl + '/client-photos', {
              method: 'POST',
              headers: {
                'x-admin-token': adminToken
              },
              body: form
            });
            if (!res.ok) {
              failed += 1;
              continue;
            }
            uploaded += 1;
          } catch (_e) {
            failed += 1;
          }
        }

        fileEl.value = '';
        setStatus('upload complete. uploaded: ' + uploaded + ', failed: ' + failed + '.');
        fetchPhotos();
      }

      function parseBulkLines(raw) {
        return String(raw || '')
          .split('\n')
          .map(function (line) { return line.trim(); })
          .filter(Boolean)
          .map(function (line) {
            var parts = line.split('|').map(function (part) { return part.trim(); });
            return {
              image_url: parts[0] || '',
              date: parts[1] || '',
              location: parts.slice(2).join(' | ')
            };
          });
      }

      function importBatch(photos) {
        if (!ensureConfig()) return;
        var adminToken = token();
        if (!adminToken) {
          setStatus('admin token is required for batch import.');
          return;
        }
        if (!photos.length) {
          setStatus('nothing to import.');
          return;
        }
        persistToken();
        setStatus('importing batch...');
        fetch(workerUrl + '/client-photos/batch', {
          method: 'POST',
          headers: {
            'content-type': 'application/json',
            'x-admin-token': adminToken
          },
          body: JSON.stringify({ photos: photos })
        })
          .then(function (res) {
            if (!res.ok) return res.json().then(function (data) { throw new Error(data.error || 'batch import failed'); });
            return res.json();
          })
          .then(function (result) {
            setStatus('batch import done. inserted: ' + result.inserted_count + ', skipped: ' + result.skipped_count + '.');
            fetchPhotos();
          })
          .catch(function (err) {
            setStatus(err && err.message ? err.message : 'batch import failed');
          });
      }

      function importFromTextArea() {
        var photos = parseBulkLines(bulkEl.value);
        importBatch(photos);
      }

      function importFromLocalJson() {
        setStatus('loading local JSON...');
        fetch('./photography-client-data.json', { cache: 'no-store' })
          .then(function (res) {
            if (!res.ok) throw new Error('could not load local JSON');
            return res.json();
          })
          .then(function (entries) {
            var photos = (Array.isArray(entries) ? entries : [])
              .map(function (entry) {
                return {
                  image_url: entry && entry.image ? String(entry.image).trim() : '',
                  date: entry && entry.date ? String(entry.date).trim() : '',
                  location: entry && entry.location ? String(entry.location).trim() : ''
                };
              })
              .filter(function (entry) {
                return entry.image_url && entry.date && entry.location;
              });

            importBatch(photos);
          })
          .catch(function (err) {
            setStatus(err && err.message ? err.message : 'failed to import local JSON');
          });
      }

      function savePhotoEdits(id, imageUrl, dateValue, locationValue) {
        if (!ensureConfig()) return;
        var adminToken = token();
        if (!adminToken) {
          setStatus('admin token is required for save.');
          return;
        }
        persistToken();
        setStatus('saving...');
        fetch(workerUrl + '/client-photos/' + encodeURIComponent(id), {
          method: 'PUT',
          headers: {
            'content-type': 'application/json',
            'x-admin-token': adminToken
          },
          body: JSON.stringify({
            image_url: imageUrl,
            date: dateValue,
            location: locationValue
          })
        })
          .then(function (res) {
            if (!res.ok) return res.json().then(function (data) { throw new Error(data.error || 'save failed'); });
            return res.json();
          })
          .then(function () {
            setStatus('saved.');
            fetchPhotos();
          })
          .catch(function (err) {
            setStatus(err && err.message ? err.message : 'save failed');
          });
      }

      function deletePhoto(id) {
        if (!ensureConfig()) return;
        var adminToken = token();
        if (!adminToken) {
          setStatus('admin token is required for delete.');
          return;
        }
        if (!confirm('Delete this photo?')) return;

        persistToken();
        setStatus('deleting...');
        fetch(workerUrl + '/client-photos/' + encodeURIComponent(id), {
          method: 'DELETE',
          headers: {
            'x-admin-token': adminToken
          }
        })
          .then(function (res) {
            if (!res.ok) return res.json().then(function (data) { throw new Error(data.error || 'delete failed'); });
            return res.json();
          })
          .then(function () {
            setStatus('photo deleted.');
            fetchPhotos();
          })
          .catch(function (err) {
            setStatus(err && err.message ? err.message : 'delete failed');
          });
      }

      uploadBtn.addEventListener('click', uploadPhoto);
      refreshBtn.addEventListener('click', fetchPhotos);
      bulkImportBtn.addEventListener('click', importFromTextArea);
      importLocalBtn.addEventListener('click', importFromLocalJson);
      listEl.addEventListener('click', function (event) {
        var saveBtn = event.target.closest('[data-save-id]');
        if (saveBtn) {
          var saveId = saveBtn.getAttribute('data-save-id');
          var imageUrl = saveBtn.getAttribute('data-image-url') || '';
          var dateInput = listEl.querySelector('[data-edit-date-id="' + saveId + '"]');
          var locationInput = listEl.querySelector('[data-edit-location-id="' + saveId + '"]');
          savePhotoEdits(saveId, imageUrl, dateInput ? dateInput.value : '', locationInput ? locationInput.value : '');
          return;
        }

        var deleteBtn = event.target.closest('[data-delete-id]');
        if (!deleteBtn) return;
        deletePhoto(deleteBtn.getAttribute('data-delete-id'));
      });

      loadPersistedToken();
      fetchPhotos();
    })();
  </script>

  <script src="../scripts/page-transitions.js"></script>
  <script src="../scripts/dot-grid.js"></script>
  <script src="../scripts/clocks.js"></script>
</body>

</html>
