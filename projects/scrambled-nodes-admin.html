<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>scrambled nodes admin</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <link rel="stylesheet" href="../styles/tailwind-prod.css">
  <link rel="stylesheet" href="../styles/dot-grid.css">
  <link rel="stylesheet" href="../styles/clocks.css">
  <style>
    body { background: #071021; color: #e6eef6; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
    .page { max-width: 1060px; margin: 0 auto; padding: 150px 24px 70px; position: relative; z-index: 10; }
    h1 { margin: 0; font-size: clamp(2rem, 4vw, 3rem); font-weight: 500; letter-spacing: -0.04em; text-transform: lowercase; }
    .sub { margin-top: 0.45rem; font-size: 0.84rem; color: rgba(194, 205, 221, 0.78); }
    .card { margin-top: 1rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 1rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .full { grid-column: 1 / -1; }
    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    label { font-size: 0.73rem; color: rgba(194,205,221,0.9); text-transform: lowercase; }
    input, select, textarea {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 8px;
      color: #e6eef6;
      padding: 0.62rem 0.72rem;
      font-size: 0.85rem;
    }
    select, option {
      background: #0c1425;
      color: #e6eef6;
    }
    textarea { min-height: 120px; resize: vertical; font-family: "Courier New", monospace; line-height: 1.45; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 0.55rem; margin-top: 0.9rem; }
    button {
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      border-radius: 8px;
      font-size: 0.8rem;
      padding: 0.55rem 0.85rem;
      cursor: pointer;
    }
    button:hover { background: rgba(255,255,255,0.16); }
    .status { margin-top: 0.65rem; font-size: 0.8rem; color: rgba(194,205,221,0.9); }
    .list-item { border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 0.65rem; margin-top: 0.5rem; }
    .list-item strong { color: #fff; }
    .small { color: rgba(194,205,221,0.78); font-size: 0.78rem; margin-top: 0.2rem; line-height: 1.4; }
    .short { margin-top: 0.35rem; font-size: 0.8rem; color: rgba(223,231,244,0.94); }
    @media (max-width: 840px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="min-h-screen">
  <div class="dot-grid-wrapper"></div>
  <script src="../scripts/site-header.js"></script>
  <script src="../scripts/cloudflare-config.js"></script>

  <main class="page">
    <a href="../scrambled.html" class="text-white/45 text-sm hover:text-white transition-colors">&larr; open scrambled mind</a>
    <h1 class="mt-3">scrambled nodes admin</h1>
    <p class="sub">add/edit nodes directly in cloudflare. no snippets required. existing nodes are listed below with short descriptions for easier linking.</p>

    <section class="card">
      <div class="field full">
        <label for="admin-token">admin token</label>
        <input id="admin-token" type="password" placeholder="PHOTOGRAPHY_ADMIN_TOKEN" autocomplete="off" />
      </div>

      <div class="grid mt-3">
        <div class="field">
          <label for="node-id">node id</label>
          <input id="node-id" type="text" placeholder="idea_7" />
        </div>
        <div class="field">
          <label for="node-name">name</label>
          <input id="node-name" type="text" placeholder="node title" />
        </div>
        <div class="field">
          <label for="node-group">group (1-5)</label>
          <select id="node-group">
            <option value="1">1 (start)</option>
            <option value="2" selected>2 (journal)</option>
            <option value="3">3 (idea)</option>
            <option value="4">4 (list)</option>
            <option value="5">5 (image node)</option>
          </select>
        </div>
        <div class="field">
          <label for="node-val">val</label>
          <input id="node-val" type="number" value="8" />
        </div>
        <div class="field">
          <label for="node-date">date</label>
          <input id="node-date" type="text" placeholder="05/14/2026" />
        </div>
        <div class="field">
          <label for="node-now-playing">now playing</label>
          <input id="node-now-playing" type="text" placeholder="artist/song" />
        </div>
        <div class="field full">
          <label for="node-now-playing-url">now playing url</label>
          <input id="node-now-playing-url" type="text" placeholder="https://open.spotify.com/..." />
        </div>
        <div class="field full">
          <label for="node-image">image url (optional)</label>
          <input id="node-image" type="text" placeholder="https://... (for image nodes)" />
        </div>
        <div class="field full">
          <label for="node-content">content</label>
          <textarea id="node-content" placeholder="node content here"></textarea>
        </div>
      </div>

      <div class="btn-row">
        <button id="save-node-btn" type="button">save node</button>
        <button id="clear-node-btn" type="button">clear node form</button>
      </div>
    </section>

    <section class="card">
      <div class="grid">
        <div class="field">
          <label for="link-source">link source</label>
          <select id="link-source"></select>
        </div>
        <div class="field">
          <label for="link-target">link target</label>
          <select id="link-target"></select>
        </div>
      </div>
      <div class="btn-row">
        <button id="add-link-btn" type="button">add link</button>
        <button id="import-local-btn" type="button">import existing nodes</button>
      </div>
      <p class="status" id="status"></p>
    </section>

    <section class="card">
      <h2 class="text-lg mb-2">existing nodes</h2>
      <div id="nodes-list"></div>
    </section>

    <section class="card">
      <h2 class="text-lg mb-2">existing links</h2>
      <div id="links-list"></div>
    </section>
  </main>

  <script>
    (function () {
      var workerUrl = (window.CLOUDFLARE_WORKER_URL || '').replace(/\/$/, '');
      var tokenEl = document.getElementById('admin-token');
      var statusEl = document.getElementById('status');
      var nodesListEl = document.getElementById('nodes-list');
      var linksListEl = document.getElementById('links-list');

      var form = {
        id: document.getElementById('node-id'),
        name: document.getElementById('node-name'),
        group: document.getElementById('node-group'),
        val: document.getElementById('node-val'),
        date: document.getElementById('node-date'),
        nowPlaying: document.getElementById('node-now-playing'),
        nowPlayingUrl: document.getElementById('node-now-playing-url'),
        img: document.getElementById('node-image'),
        content: document.getElementById('node-content'),
        linkSource: document.getElementById('link-source'),
        linkTarget: document.getElementById('link-target')
      };

      var dbGraph = { nodes: [], links: [] };
      var localGraph = { nodes: [], links: [] };
      var graph = { nodes: [], links: [] };

      function setStatus(message) {
        statusEl.textContent = message || '';
      }

      function token() {
        return (tokenEl.value || '').trim();
      }

      function saveToken() {
        localStorage.setItem('scrambled_admin_token', token());
      }

      function loadToken() {
        tokenEl.value = localStorage.getItem('scrambled_admin_token') || '';
      }

      function esc(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function shortText(value) {
        var text = String(value || '').replace(/\s+/g, ' ').trim();
        if (text.length <= 120) return text;
        return text.slice(0, 117) + '...';
      }

      function parseLocalGDataFromHtml(html) {
        var match = html.match(/const gData =([\s\S]*?)\r?\n\s*let Graph;/);
        if (!match || !match[1]) return { nodes: [], links: [] };
        try {
          var raw = match[1].trim();
          if (raw.endsWith(';')) raw = raw.slice(0, -1);
          var parsed = (new Function('return (' + raw + ');'))();
          return {
            nodes: Array.isArray(parsed && parsed.nodes) ? parsed.nodes : [],
            links: Array.isArray(parsed && parsed.links) ? parsed.links : []
          };
        } catch (_e) {
          return { nodes: [], links: [] };
        }
      }

      function mergeGraphs() {
        var nodeMap = new Map();
        (localGraph.nodes || []).forEach(function (node) {
          if (!node || !node.id) return;
          nodeMap.set(String(node.id), Object.assign({}, node, { _source: 'local' }));
        });
        (dbGraph.nodes || []).forEach(function (node) {
          if (!node || !node.id) return;
          nodeMap.set(String(node.id), Object.assign({}, node, { _source: 'db' }));
        });

        var linkMap = new Map();
        (localGraph.links || []).forEach(function (link) {
          if (!link || !link.source || !link.target) return;
          var key = String(link.source) + '->' + String(link.target);
          linkMap.set(key, {
            id: '',
            source: String(link.source),
            target: String(link.target),
            _source: 'local'
          });
        });
        (dbGraph.links || []).forEach(function (link) {
          if (!link || !link.source || !link.target) return;
          var key = String(link.source) + '->' + String(link.target);
          linkMap.set(key, {
            id: link.id || '',
            source: String(link.source),
            target: String(link.target),
            _source: 'db'
          });
        });

        graph.nodes = Array.from(nodeMap.values());
        graph.links = Array.from(linkMap.values());
      }

      function toNodeId(name) {
        var base = String(name || '')
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, '_')
          .replace(/^_+|_+$/g, '')
          .slice(0, 60);
        if (!base) base = 'node';
        return base + '_' + Date.now().toString(36).slice(-5);
      }

      function ensureWorker() {
        if (!workerUrl) {
          setStatus('CLOUDFLARE_WORKER_URL is missing in scripts/cloudflare-config.js');
          return false;
        }
        return true;
      }

      function populateNodeSelects() {
        var opts = graph.nodes.map(function (node) {
          return '<option value="' + esc(node.id) + '">' + esc(node.id + ' - ' + node.name) + '</option>';
        }).join('');
        form.linkSource.innerHTML = opts;
        form.linkTarget.innerHTML = opts;
      }

      function renderNodes() {
        if (!graph.nodes.length) {
          nodesListEl.innerHTML = '<div class="list-item">no nodes found.</div>';
          return;
        }

        nodesListEl.innerHTML = graph.nodes.map(function (node) {
          var sourceLabel = node._source === 'db' ? 'database' : 'existing page';
          return [
            '<article class="list-item">',
            '<strong>', esc(node.id), '</strong> — ', esc(node.name || ''), ' (group ', esc(node.group), ')',
            '<div class="small">source: ', esc(sourceLabel), ' | date: ', esc(node.date || 'n/a'), ' | now playing: ', esc(node.nowPlaying || 'n/a'), '</div>',
            '<div class="short">', esc(shortText(node.content)), '</div>',
            '<div class="btn-row">',
            '<button data-edit-node="', esc(node.id), '" type="button">edit</button>',
            (node._source === 'db' ? ('<button data-delete-node="' + esc(node.id) + '" type="button">delete</button>') : ''),
            '</div>',
            '</article>'
          ].join('');
        }).join('');
      }

      function renderLinks() {
        if (!graph.links.length) {
          linksListEl.innerHTML = '<div class="list-item">no links found.</div>';
          return;
        }

        linksListEl.innerHTML = graph.links.map(function (link) {
          var sourceLabel = link._source === 'db' ? 'database' : 'existing page';
          return [
            '<article class="list-item">',
            '<strong>', esc(link.source), '</strong> → <strong>', esc(link.target), '</strong>',
            '<div class="small">source: ', esc(sourceLabel), '</div>',
            (link._source === 'db' ? ('<div class="btn-row"><button data-delete-link="' + esc(link.id || '') + '" type="button">delete</button></div>') : ''),
            '</article>'
          ].join('');
        }).join('');
      }

      function renderAll() {
        renderNodes();
        renderLinks();
        populateNodeSelects();
      }

      function loadGraph() {
        if (!ensureWorker()) return;
        setStatus('loading graph...');
        fetch(workerUrl + '/scrambled-graph', { cache: 'no-store' })
          .then(function (res) {
            if (!res.ok) throw new Error('failed to load graph');
            return res.json();
          })
          .then(function (data) {
            dbGraph.nodes = Array.isArray(data.nodes) ? data.nodes : [];
            dbGraph.links = Array.isArray(data.links) ? data.links : [];
            mergeGraphs();
            renderAll();
            setStatus('loaded ' + dbGraph.nodes.length + ' db nodes + ' + localGraph.nodes.length + ' existing-page nodes.');
          })
          .catch(function (err) {
            setStatus(err && err.message ? err.message : 'failed to load graph');
          });
      }

      function loadLocalGraph() {
        fetch('../scrambled.html', { cache: 'no-store' })
          .then(function (res) {
            if (!res.ok) throw new Error('failed to load local graph source');
            return res.text();
          })
          .then(function (html) {
            localGraph = parseLocalGDataFromHtml(html);
            mergeGraphs();
            renderAll();
          })
          .catch(function () {
            localGraph = { nodes: [], links: [] };
            mergeGraphs();
            renderAll();
          });
      }

      async function importLocalGraph() {
        if (!ensureWorker()) return;
        if (!token()) {
          setStatus('admin token is required.');
          return;
        }
        if (!localGraph.nodes.length) {
          setStatus('no existing page nodes found to import.');
          return;
        }
        saveToken();
        setStatus('importing existing nodes and links...');
        try {
          for (var i = 0; i < localGraph.nodes.length; i += 1) {
            var node = localGraph.nodes[i];
            var nodeRes = await fetch(workerUrl + '/scrambled-nodes/' + encodeURIComponent(node.id), {
              method: 'PUT',
              headers: {
                'content-type': 'application/json',
                'x-admin-token': token()
              },
              body: JSON.stringify({
                id: node.id || '',
                name: node.name || '',
                group: Number(node.group || 2),
                val: Number(node.val || 8),
                content: node.content || '',
                date: node.date || '',
                nowPlaying: node.nowPlaying || '',
                nowPlayingUrl: node.nowPlayingUrl || '',
                img: node.img || ''
              })
            });
            if (!nodeRes.ok) throw new Error('node import failed');
          }
          for (var j = 0; j < localGraph.links.length; j += 1) {
            var link = localGraph.links[j];
            var linkRes = await fetch(workerUrl + '/scrambled-links', {
              method: 'POST',
              headers: {
                'content-type': 'application/json',
                'x-admin-token': token()
              },
              body: JSON.stringify({
                source: link.source || '',
                target: link.target || ''
              })
            });
            if (!linkRes.ok) throw new Error('link import failed');
          }
          setStatus('import complete.');
          loadGraph();
        } catch (_e) {
          setStatus('import failed. check token and worker logs.');
        }
      }

      function clearNodeForm() {
        form.id.value = '';
        form.name.value = '';
        form.group.value = '2';
        form.val.value = '8';
        form.date.value = '';
        form.nowPlaying.value = '';
        form.nowPlayingUrl.value = '';
        form.img.value = '';
        form.content.value = '';
      }

      function saveNode() {
        if (!ensureWorker()) return;
        if (!token()) {
          setStatus('admin token is required.');
          return;
        }
        var id = form.id.value.trim();
        var name = form.name.value.trim();
        var content = form.content.value || '';
        if (!name || !content.trim()) {
          setStatus('name and content are required.');
          return;
        }
        var isCreate = !id;
        if (isCreate) {
          id = toNodeId(name);
          form.id.value = id;
        }

        saveToken();
        setStatus(isCreate ? 'creating node...' : 'saving node...');
        fetch(isCreate ? (workerUrl + '/scrambled-nodes') : (workerUrl + '/scrambled-nodes/' + encodeURIComponent(id)), {
          method: isCreate ? 'POST' : 'PUT',
          headers: {
            'content-type': 'application/json',
            'x-admin-token': token()
          },
          body: JSON.stringify({
            id: id,
            name: name,
            group: Number(form.group.value || 2),
            val: Number(form.val.value || 8),
            content: content,
            date: form.date.value.trim(),
            nowPlaying: form.nowPlaying.value.trim(),
            nowPlayingUrl: form.nowPlayingUrl.value.trim(),
            img: form.img.value.trim()
          })
        })
          .then(function (res) {
            if (!res.ok) return res.json().then(function (d) { throw new Error(d.error || 'save failed'); });
            return res.json();
          })
          .then(function () {
            setStatus(isCreate ? ('node created: ' + id) : 'node saved.');
            loadGraph();
          })
          .catch(function (err) {
            setStatus(err && err.message ? err.message : 'save failed');
          });
      }

      function deleteNode(id) {
        if (!ensureWorker()) return;
        if (!token()) {
          setStatus('admin token is required.');
          return;
        }
        if (!confirm('delete node ' + id + '? this removes related links too.')) return;

        saveToken();
        setStatus('deleting node...');
        fetch(workerUrl + '/scrambled-nodes/' + encodeURIComponent(id), {
          method: 'DELETE',
          headers: { 'x-admin-token': token() }
        })
          .then(function (res) {
            if (!res.ok) return res.json().then(function (d) { throw new Error(d.error || 'delete failed'); });
            return res.json();
          })
          .then(function () {
            setStatus('node deleted.');
            clearNodeForm();
            loadGraph();
          })
          .catch(function (err) {
            setStatus(err && err.message ? err.message : 'delete failed');
          });
      }

      function addLink() {
        if (!ensureWorker()) return;
        if (!token()) {
          setStatus('admin token is required.');
          return;
        }
        var source = form.linkSource.value;
        var target = form.linkTarget.value;
        if (!source || !target) {
          setStatus('select source and target.');
          return;
        }

        saveToken();
        setStatus('adding link...');
        fetch(workerUrl + '/scrambled-links', {
          method: 'POST',
          headers: {
            'content-type': 'application/json',
            'x-admin-token': token()
          },
          body: JSON.stringify({ source: source, target: target })
        })
          .then(function (res) {
            if (!res.ok) return res.json().then(function (d) { throw new Error(d.error || 'add link failed'); });
            return res.json();
          })
          .then(function () {
            setStatus('link saved.');
            loadGraph();
          })
          .catch(function (err) {
            setStatus(err && err.message ? err.message : 'add link failed');
          });
      }

      function deleteLink(id) {
        if (!ensureWorker()) return;
        if (!token()) {
          setStatus('admin token is required.');
          return;
        }
        if (!id) {
          setStatus('missing link id.');
          return;
        }
        saveToken();
        setStatus('deleting link...');
        fetch(workerUrl + '/scrambled-links/' + encodeURIComponent(id), {
          method: 'DELETE',
          headers: { 'x-admin-token': token() }
        })
          .then(function (res) {
            if (!res.ok) return res.json().then(function (d) { throw new Error(d.error || 'delete link failed'); });
            return res.json();
          })
          .then(function () {
            setStatus('link deleted.');
            loadGraph();
          })
          .catch(function (err) {
            setStatus(err && err.message ? err.message : 'delete link failed');
          });
      }

      nodesListEl.addEventListener('click', function (event) {
        var editBtn = event.target.closest('[data-edit-node]');
        if (editBtn) {
          var id = editBtn.getAttribute('data-edit-node');
          var node = graph.nodes.find(function (n) { return n.id === id; });
          if (!node) return;
          form.id.value = node.id || '';
          form.name.value = node.name || '';
          form.group.value = String(node.group || 2);
          form.val.value = String(node.val || 8);
          form.date.value = node.date || '';
          form.nowPlaying.value = node.nowPlaying || '';
          form.nowPlayingUrl.value = node.nowPlayingUrl || '';
          form.img.value = node.img || '';
          form.content.value = node.content || '';
          setStatus('node loaded into form.');
          return;
        }
        var delBtn = event.target.closest('[data-delete-node]');
        if (delBtn) {
          deleteNode(delBtn.getAttribute('data-delete-node'));
        }
      });

      linksListEl.addEventListener('click', function (event) {
        var delBtn = event.target.closest('[data-delete-link]');
        if (!delBtn) return;
        deleteLink(delBtn.getAttribute('data-delete-link'));
      });

      document.getElementById('save-node-btn').addEventListener('click', saveNode);
      document.getElementById('clear-node-btn').addEventListener('click', function () {
        clearNodeForm();
        setStatus('node form cleared.');
      });
      document.getElementById('add-link-btn').addEventListener('click', addLink);
      document.getElementById('import-local-btn').addEventListener('click', importLocalGraph);

      loadToken();
      loadLocalGraph();
      loadGraph();
    })();
  </script>

  <script src="../scripts/page-transitions.js"></script>
  <script src="../scripts/dot-grid.js"></script>
  <script src="../scripts/clocks.js"></script>
</body>
</html>
