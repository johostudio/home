<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>scrambled nodes admin</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <link rel="stylesheet" href="../styles/tailwind-prod.css">
  <link rel="stylesheet" href="../styles/dot-grid.css">
  <link rel="stylesheet" href="../styles/clocks.css">
  <style>
    body { background: #071021; color: #e6eef6; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
    .page { max-width: 1060px; margin: 0 auto; padding: 150px 24px 70px; position: relative; z-index: 10; }
    h1 { margin: 0; font-size: clamp(2rem, 4vw, 3rem); font-weight: 500; letter-spacing: -0.04em; text-transform: lowercase; }
    .sub { margin-top: 0.45rem; font-size: 0.84rem; color: rgba(194, 205, 221, 0.78); }
    .card { margin-top: 1rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 1rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .full { grid-column: 1 / -1; }
    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    label { font-size: 0.73rem; color: rgba(194,205,221,0.9); text-transform: lowercase; }
    input, select, textarea {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 8px;
      color: #e6eef6;
      padding: 0.62rem 0.72rem;
      font-size: 0.85rem;
    }
    textarea { min-height: 120px; resize: vertical; font-family: "Courier New", monospace; line-height: 1.45; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 0.55rem; margin-top: 0.9rem; }
    button {
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      border-radius: 8px;
      font-size: 0.8rem;
      padding: 0.55rem 0.85rem;
      cursor: pointer;
    }
    button:hover { background: rgba(255,255,255,0.16); }
    .status { margin-top: 0.65rem; font-size: 0.8rem; color: rgba(194,205,221,0.9); }
    .list { font-size: 0.8rem; line-height: 1.45; color: rgba(220,228,241,0.92); }
    .list-item { border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 0.6rem; margin-top: 0.5rem; }
    .list-item strong { color: #fff; }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
      font-size: 0.8rem;
      line-height: 1.5;
      font-family: "Courier New", monospace;
      min-height: 160px;
    }
    .out-title { font-size: 0.78rem; margin-bottom: 0.45rem; color: rgba(194,205,221,0.85); text-transform: lowercase; }
    @media (max-width: 840px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="min-h-screen">
  <div class="dot-grid-wrapper"></div>
  <script src="../scripts/site-header.js"></script>

  <main class="page">
    <a href="../scrambled.html" class="text-white/45 text-sm hover:text-white transition-colors">&larr; open scrambled mind</a>
    <h1 class="mt-3">scrambled nodes admin</h1>
    <p class="sub">build node + link snippets quickly. save drafts locally and copy output into <code>scrambled.html</code> (<code>gData.nodes</code> and <code>gData.links</code>).</p>

    <section class="card">
      <div class="grid">
        <div class="field">
          <label for="node-id">node id</label>
          <input id="node-id" type="text" placeholder="idea_7" />
        </div>
        <div class="field">
          <label for="node-name">name</label>
          <input id="node-name" type="text" placeholder="node title" />
        </div>
        <div class="field">
          <label for="node-group">group (1-5)</label>
          <select id="node-group">
            <option value="1">1 (start)</option>
            <option value="2" selected>2 (journal)</option>
            <option value="3">3 (idea)</option>
            <option value="4">4 (list)</option>
            <option value="5">5 (image node)</option>
          </select>
        </div>
        <div class="field">
          <label for="node-val">val</label>
          <input id="node-val" type="number" value="8" />
        </div>
        <div class="field">
          <label for="node-date">date</label>
          <input id="node-date" type="text" placeholder="05/14/2026" />
        </div>
        <div class="field">
          <label for="node-now-playing">now playing</label>
          <input id="node-now-playing" type="text" placeholder="artist/song" />
        </div>
        <div class="field full">
          <label for="node-now-playing-url">now playing url</label>
          <input id="node-now-playing-url" type="text" placeholder="https://open.spotify.com/..." />
        </div>
        <div class="field full">
          <label for="node-image">image url (optional)</label>
          <input id="node-image" type="text" placeholder="https://... (for image nodes)" />
        </div>
        <div class="field full">
          <label for="node-content">content</label>
          <textarea id="node-content" placeholder="node text, line breaks allowed"></textarea>
        </div>
      </div>

      <div class="btn-row">
        <button id="add-node-btn" type="button">add / update node</button>
        <button id="clear-node-form-btn" type="button">clear form</button>
      </div>
    </section>

    <section class="card">
      <div class="grid">
        <div class="field">
          <label for="link-source">link source id</label>
          <input id="link-source" type="text" placeholder="start" />
        </div>
        <div class="field">
          <label for="link-target">link target id</label>
          <input id="link-target" type="text" placeholder="idea_7" />
        </div>
      </div>
      <div class="btn-row">
        <button id="add-link-btn" type="button">add link</button>
      </div>
      <p class="status" id="status"></p>
    </section>

    <section class="card">
      <div class="out-title">current nodes</div>
      <div class="list" id="nodes-list"></div>
      <div class="out-title mt-4">current links</div>
      <div class="list" id="links-list"></div>
    </section>

    <section class="card">
      <div class="btn-row">
        <button id="generate-btn" type="button">generate node/link snippets</button>
        <button id="copy-nodes-btn" type="button">copy nodes snippet</button>
        <button id="copy-links-btn" type="button">copy links snippet</button>
        <button id="save-btn" type="button">save draft</button>
        <button id="reset-btn" type="button">reset all</button>
      </div>
    </section>

    <section class="card">
      <div class="out-title">nodes snippet</div>
      <pre id="nodes-output"></pre>
    </section>

    <section class="card">
      <div class="out-title">links snippet</div>
      <pre id="links-output"></pre>
    </section>
  </main>

  <script>
    (function () {
      var KEY = 'scrambled_nodes_admin_v1';
      var statusEl = document.getElementById('status');
      var nodesListEl = document.getElementById('nodes-list');
      var linksListEl = document.getElementById('links-list');
      var nodesOutput = document.getElementById('nodes-output');
      var linksOutput = document.getElementById('links-output');

      var form = {
        id: document.getElementById('node-id'),
        name: document.getElementById('node-name'),
        group: document.getElementById('node-group'),
        val: document.getElementById('node-val'),
        date: document.getElementById('node-date'),
        nowPlaying: document.getElementById('node-now-playing'),
        nowPlayingUrl: document.getElementById('node-now-playing-url'),
        img: document.getElementById('node-image'),
        content: document.getElementById('node-content'),
        linkSource: document.getElementById('link-source'),
        linkTarget: document.getElementById('link-target')
      };

      var state = { nodes: [], links: [] };

      function setStatus(message) { statusEl.textContent = message || ''; }
      function escSingle(value) { return String(value || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }

      function load() {
        try {
          var raw = localStorage.getItem(KEY);
          if (!raw) return;
          var parsed = JSON.parse(raw);
          state.nodes = Array.isArray(parsed.nodes) ? parsed.nodes : [];
          state.links = Array.isArray(parsed.links) ? parsed.links : [];
        } catch (_e) {}
      }

      function save() {
        localStorage.setItem(KEY, JSON.stringify(state));
      }

      function render() {
        if (!state.nodes.length) {
          nodesListEl.innerHTML = '<div class="list-item">no nodes yet.</div>';
        } else {
          nodesListEl.innerHTML = state.nodes.map(function (node) {
            return (
              '<div class="list-item">' +
              '<strong>' + node.id + '</strong> &mdash; ' + (node.name || '') + ' (group ' + node.group + ')' +
              '<div class="mt-2 flex gap-2">' +
              '<button data-edit-node="' + node.id + '" type="button">edit</button>' +
              '<button data-delete-node="' + node.id + '" type="button">delete</button>' +
              '</div>' +
              '</div>'
            );
          }).join('');
        }

        if (!state.links.length) {
          linksListEl.innerHTML = '<div class="list-item">no links yet.</div>';
        } else {
          linksListEl.innerHTML = state.links.map(function (link, index) {
            return (
              '<div class="list-item">' +
              '<strong>' + link.source + '</strong> &rarr; <strong>' + link.target + '</strong>' +
              '<div class="mt-2"><button data-delete-link="' + index + '" type="button">delete</button></div>' +
              '</div>'
            );
          }).join('');
        }
      }

      function clearForm() {
        form.id.value = '';
        form.name.value = '';
        form.group.value = '2';
        form.val.value = '8';
        form.date.value = '';
        form.nowPlaying.value = '';
        form.nowPlayingUrl.value = '';
        form.img.value = '';
        form.content.value = '';
      }

      function upsertNode() {
        var id = form.id.value.trim();
        if (!id) { setStatus('Node id is required.'); return; }
        var node = {
          id: id,
          name: form.name.value.trim(),
          group: Number(form.group.value || 2),
          val: Number(form.val.value || 8),
          content: form.content.value || '',
          date: form.date.value.trim(),
          nowPlaying: form.nowPlaying.value.trim(),
          nowPlayingUrl: form.nowPlayingUrl.value.trim()
        };
        if (form.img.value.trim()) node.img = form.img.value.trim();

        var idx = state.nodes.findIndex(function (n) { return n.id === id; });
        if (idx >= 0) state.nodes[idx] = node;
        else state.nodes.push(node);

        render();
        setStatus(idx >= 0 ? 'Node updated.' : 'Node added.');
      }

      function addLink() {
        var source = form.linkSource.value.trim();
        var target = form.linkTarget.value.trim();
        if (!source || !target) { setStatus('Link source and target are required.'); return; }
        var exists = state.links.some(function (l) { return l.source === source && l.target === target; });
        if (exists) { setStatus('Link already exists.'); return; }
        state.links.push({ source: source, target: target });
        render();
        setStatus('Link added.');
      }

      function nodeToSnippet(node) {
        var parts = [];
        parts.push("{ id: '" + escSingle(node.id) + "'");
        if (node.name) parts.push("name: '" + escSingle(node.name) + "'");
        if (Number.isFinite(node.group)) parts.push('group: ' + node.group);
        if (Number.isFinite(node.val)) parts.push('val: ' + node.val);
        if (node.img) parts.push("img: '" + escSingle(node.img) + "'");
        parts.push("content: '" + escSingle((node.content || '').replace(/\r?\n/g, '\\n')) + "'");
        if (node.date) parts.push("date: '" + escSingle(node.date) + "'");
        if (node.nowPlaying) parts.push("nowPlaying: '" + escSingle(node.nowPlaying) + "'");
        if (node.nowPlayingUrl) parts.push("nowPlayingUrl: '" + escSingle(node.nowPlayingUrl) + "'");
        return parts.join(', ') + ' }';
      }

      function generateSnippets() {
        nodesOutput.textContent = state.nodes.map(nodeToSnippet).join(',\n');
        linksOutput.textContent = state.links.map(function (link) {
          return "{ source: '" + escSingle(link.source) + "', target: '" + escSingle(link.target) + "' }";
        }).join(',\n');
      }

      document.getElementById('add-node-btn').addEventListener('click', function () {
        upsertNode();
      });
      document.getElementById('clear-node-form-btn').addEventListener('click', function () {
        clearForm();
        setStatus('Node form cleared.');
      });
      document.getElementById('add-link-btn').addEventListener('click', function () {
        addLink();
      });
      document.getElementById('generate-btn').addEventListener('click', function () {
        generateSnippets();
        setStatus('Snippets generated.');
      });
      document.getElementById('copy-nodes-btn').addEventListener('click', function () {
        if (!nodesOutput.textContent) generateSnippets();
        navigator.clipboard.writeText(nodesOutput.textContent).then(function () {
          setStatus('Nodes snippet copied.');
        }).catch(function () { setStatus('Copy failed.'); });
      });
      document.getElementById('copy-links-btn').addEventListener('click', function () {
        if (!linksOutput.textContent) generateSnippets();
        navigator.clipboard.writeText(linksOutput.textContent).then(function () {
          setStatus('Links snippet copied.');
        }).catch(function () { setStatus('Copy failed.'); });
      });
      document.getElementById('save-btn').addEventListener('click', function () {
        save();
        setStatus('Draft saved in browser.');
      });
      document.getElementById('reset-btn').addEventListener('click', function () {
        state = { nodes: [], links: [] };
        save();
        render();
        nodesOutput.textContent = '';
        linksOutput.textContent = '';
        clearForm();
        setStatus('All reset.');
      });

      nodesListEl.addEventListener('click', function (event) {
        var editBtn = event.target.closest('[data-edit-node]');
        if (editBtn) {
          var id = editBtn.getAttribute('data-edit-node');
          var node = state.nodes.find(function (n) { return n.id === id; });
          if (!node) return;
          form.id.value = node.id || '';
          form.name.value = node.name || '';
          form.group.value = String(node.group || 2);
          form.val.value = String(node.val || 8);
          form.date.value = node.date || '';
          form.nowPlaying.value = node.nowPlaying || '';
          form.nowPlayingUrl.value = node.nowPlayingUrl || '';
          form.img.value = node.img || '';
          form.content.value = (node.content || '').replace(/\\n/g, '\n');
          setStatus('Loaded node for editing.');
          return;
        }
        var delBtn = event.target.closest('[data-delete-node]');
        if (delBtn) {
          var delId = delBtn.getAttribute('data-delete-node');
          state.nodes = state.nodes.filter(function (n) { return n.id !== delId; });
          state.links = state.links.filter(function (l) { return l.source !== delId && l.target !== delId; });
          render();
          setStatus('Node deleted.');
        }
      });

      linksListEl.addEventListener('click', function (event) {
        var delBtn = event.target.closest('[data-delete-link]');
        if (!delBtn) return;
        var idx = Number(delBtn.getAttribute('data-delete-link'));
        if (!Number.isFinite(idx)) return;
        state.links.splice(idx, 1);
        render();
        setStatus('Link deleted.');
      });

      load();
      render();
    })();
  </script>

  <script src="../scripts/page-transitions.js"></script>
  <script src="../scripts/dot-grid.js"></script>
  <script src="../scripts/clocks.js"></script>
</body>
</html>
