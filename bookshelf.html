<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>my bookshelf — joho's studio</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="stylesheet" href="styles/tailwind-prod.css">
  <link rel="stylesheet" href="styles/dot-grid.css">
  <link rel="stylesheet" href="styles/clocks.css">
  <style>
    body {
      background: #000;
      color: #e6eef6;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .book-card {
      text-decoration: none;
      color: inherit;
      display: block;
      text-align: center;
      width: 100%;
      max-width: 230px;
      border: 0;
      background: transparent;
      padding: 0;
      font: inherit;
      cursor: pointer;
      justify-self: center;
    }

    .book-cover-wrap {
      aspect-ratio: 2 / 3;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 4px;
      margin-bottom: 0.2rem;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      transition: border-color 0.22s ease, box-shadow 0.22s ease, transform 0.22s ease;
      margin-left: auto;
      margin-right: auto;
    }

    .book-plank {
      width: 100%;
      height: 16px;
      border-radius: 4px;
      margin: 0 auto 0.55rem;
      border: 1px solid rgba(77, 47, 18, 0.68);
      background:
        linear-gradient(180deg, rgba(255, 212, 154, 0.26), rgba(108, 67, 28, 0.9)),
        repeating-linear-gradient(90deg, rgba(124, 79, 36, 0.55) 0 16px, rgba(97, 58, 22, 0.62) 16px 32px);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 220, 164, 0.2);
    }

    .book-card:hover .book-cover-wrap,
    .book-card:focus-visible .book-cover-wrap {
      border-color: rgba(192, 132, 252, 0.55);
      box-shadow: 0 8px 30px rgba(192, 132, 252, 0.16);
      transform: translateY(-2px);
    }

    .book-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #111;
      transition: transform 0.4s ease, filter 0.3s ease;
    }

    .book-card:hover .book-cover,
    .book-card:focus-visible .book-cover {
      transform: scale(1.03);
      filter: saturate(1.06);
    }

    .book-title {
      font-size: 13px;
      font-weight: 400;
      line-height: 1.3;
      margin: 0 0 0.25rem;
      color: #fff;
      transition: color 0.2s ease;
      text-transform: lowercase;
      letter-spacing: -0.02em;
    }

    .book-card:hover .book-title,
    .book-card:focus-visible .book-title {
      color: #e6eef6;
    }

    .book-authors {
      font-size: 11px;
      color: rgba(230, 238, 246, 0.5);
      letter-spacing: -0.01em;
      text-transform: lowercase;
      margin: 0;
      line-height: 1.35;
    }

    .books-status {
      font-size: 0.72rem;
      letter-spacing: -0.01em;
      text-transform: lowercase;
      color: rgba(230, 238, 246, 0.55);
      margin-bottom: 1.1rem;
      min-height: 1.2em;
      text-align: center;
    }

    .books-loader {
      width: min(560px, 100%);
      margin: 0 auto 1.05rem;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
    }

    .books-loader.show {
      opacity: 1;
      transform: translateY(0);
    }

    .books-loader-track {
      height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      overflow: hidden;
      background: rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 1px 5px rgba(0, 0, 0, 0.3);
    }

    .books-loader-fill {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #8b5cf6 0%, #a78bfa 34%, #c4b5fd 56%, #9333ea 100%);
      box-shadow: 0 0 14px rgba(167, 139, 250, 0.35);
      transition: width 0.28s ease;
      position: relative;
      overflow: hidden;
    }

    .books-loader-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 20%, rgba(255, 255, 255, 0.42) 50%, transparent 80%);
      transform: translateX(-100%);
      animation: loaderSweep 1.15s linear infinite;
    }

    @keyframes loaderSweep {
      to {
        transform: translateX(100%);
      }
    }

    .books-loader-text {
      margin-top: 0.38rem;
      font-size: 0.66rem;
      text-transform: lowercase;
      letter-spacing: -0.01em;
      color: rgba(230, 238, 246, 0.58);
    }

    #books-grid {
      justify-items: center;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1.8rem 1.2rem;
      align-items: end;
      max-width: 1040px;
      margin: 0 auto;
    }

    #books-grid>* {
      min-width: 0;
    }

    .books-empty {
      text-align: center;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
    }

    .archive-footer {
      margin-top: clamp(220px, 30vh, 360px);
      width: 100%;
      margin-bottom: 0.75rem;
    }

    #books-grid {
      margin-bottom: 140px;
    }

    main {
      padding-bottom: 6.8rem !important;
    }

    .book-modal {
      position: fixed;
      inset: 0;
      z-index: 1200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      pointer-events: none;
    }

    .book-modal[hidden] {
      display: none;
    }

    .book-modal.open {
      pointer-events: auto;
    }

    .book-modal-backdrop {
      position: absolute;
      inset: 0;
      border: 0;
      background: rgba(3, 4, 7, 0.72);
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity 0.34s cubic-bezier(0.22, 1, 0.36, 1);
      cursor: pointer;
    }

    .book-modal.open .book-modal-backdrop {
      opacity: 1;
    }

    .book-modal-panel {
      position: relative;
      width: min(560px, 100%);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 12px;
      background: rgba(8, 10, 14, 0.95);
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.45);
      padding: 1rem;
      opacity: 0;
      transform: translateY(16px) scale(0.972);
      transition: opacity 0.36s cubic-bezier(0.22, 1, 0.36, 1), transform 0.36s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: opacity, transform;
    }

    .book-modal.open .book-modal-panel {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .book-modal-header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 0.7rem;
      margin-bottom: 0.7rem;
    }

    .book-modal-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 400;
      text-transform: lowercase;
      letter-spacing: -0.02em;
      color: #fff;
    }

    .book-modal-close {
      width: 28px;
      height: 28px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(230, 238, 246, 0.86);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }

    .book-modal-close:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
    }

    .book-modal-grid {
      display: grid;
      grid-template-columns: minmax(120px, 152px) 1fr;
      gap: 0.9rem;
      align-items: start;
    }

    .book-modal-cover {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.04);
      overflow: hidden;
    }

    .book-modal-cover img {
      width: 100%;
      display: block;
      aspect-ratio: 2 / 3;
      object-fit: cover;
    }

    .book-modal-meta {
      display: grid;
      gap: 0.55rem;
    }

    .book-modal-rating {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid rgba(192, 132, 252, 0.45);
      border-radius: 999px;
      padding: 0.28rem 0.62rem;
      font-size: 0.72rem;
      letter-spacing: -0.01em;
      text-transform: lowercase;
      color: #f0dcff;
      background: rgba(192, 132, 252, 0.16);
      width: fit-content;
    }

    .book-modal-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.44rem;
      margin-top: -0.08rem;
    }

    .book-modal-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.06);
      color: rgba(230, 238, 246, 0.84);
      padding: 0.2rem 0.52rem;
      font-size: 0.65rem;
      line-height: 1;
      text-transform: lowercase;
      letter-spacing: -0.01em;
    }

    .book-modal-badge[data-state="finished"] {
      border-color: rgba(52, 211, 153, 0.45);
      background: rgba(52, 211, 153, 0.16);
      color: rgba(184, 252, 227, 0.96);
    }

    .book-modal-badge[data-state="reading"] {
      border-color: rgba(251, 191, 36, 0.45);
      background: rgba(251, 191, 36, 0.14);
      color: rgba(255, 229, 174, 0.96);
    }

    .books-controls {
      display: flex;
      justify-content: center;
      gap: 0.45rem;
      margin: 0 auto 0.95rem;
      flex-wrap: wrap;
    }

    .books-sort-btn {
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      color: rgba(230, 238, 246, 0.72);
      font-size: 0.66rem;
      letter-spacing: -0.01em;
      text-transform: lowercase;
      padding: 0.32rem 0.66rem;
      cursor: pointer;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .books-sort-btn.active {
      border-color: rgba(192, 132, 252, 0.48);
      background: rgba(192, 132, 252, 0.2);
      color: #f0dcff;
    }

    .book-status-reading {
      color: rgba(192, 132, 252, 0.9) !important;
    }

    .book-status-finished {
      color: rgba(230, 238, 246, 0.5) !important;
    }

    .book-modal-review {
      font-size: 0.78rem;
      line-height: 1.45;
      color: rgba(230, 238, 246, 0.78);
      letter-spacing: -0.01em;
      text-transform: lowercase;
      white-space: pre-wrap;
    }

    .book-modal-link {
      font-size: 0.72rem;
      text-transform: lowercase;
      letter-spacing: -0.01em;
      color: rgba(198, 166, 255, 0.9);
      text-decoration: none;
      width: fit-content;
    }

    .book-modal-link:hover {
      color: #fff;
      text-decoration: underline;
    }

    @media (max-width: 920px) {
      main {
        padding-top: 9.5rem !important;
        padding-left: 1.15rem !important;
        padding-right: 1.15rem !important;
      }

      #books-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1.45rem 0.9rem;
        margin-bottom: 120px;
      }

      .book-card {
        max-width: 205px;
      }

      .book-modal {
        padding: 0.95rem;
      }

      .book-modal-panel {
        max-height: calc(100dvh - 1.9rem);
        overflow-y: auto;
      }
    }

    @media (max-width: 520px) {
      .back-btn {
        top: 18px !important;
        left: 14px !important;
        font-size: 12px !important;
      }

      main {
        padding-top: 8.25rem !important;
        padding-left: 0.9rem !important;
        padding-right: 0.9rem !important;
        padding-bottom: 5.8rem !important;
      }

      #books-grid {
        grid-template-columns: 1fr;
        gap: 1.25rem;
        margin-bottom: 96px;
      }

      .book-card {
        max-width: min(82vw, 250px);
      }

      .books-controls {
        margin-bottom: 0.75rem;
        gap: 0.35rem;
      }

      .books-sort-btn {
        font-size: 0.63rem;
        padding: 0.3rem 0.58rem;
      }

      .archive-footer {
        margin-top: 150px;
        margin-bottom: 0.45rem;
      }

      .book-modal {
        padding: 0.55rem;
        align-items: flex-end;
      }

      .book-modal-backdrop {
        backdrop-filter: none;
      }

      .book-modal-panel {
        width: min(100%, 540px);
        border-radius: 10px 10px 0 0;
        padding: 0.82rem 0.82rem 0.9rem;
        max-height: calc(100dvh - 0.8rem);
      }

      .book-modal-grid {
        grid-template-columns: 1fr;
        gap: 0.72rem;
      }

      .book-modal-cover {
        width: min(156px, 48vw);
        margin: 0 auto;
      }

      .book-modal-meta {
        gap: 0.48rem;
      }

      .book-modal-meta .book-authors {
        font-size: 0.72rem;
      }

      .book-modal-review {
        font-size: 0.74rem;
        line-height: 1.4;
      }
    }
  </style>
</head>

    <div class="books-controls" id="books-controls" hidden>

      <button class="books-sort-btn" type="button" data-sort="reading">reading</button>

    <div class="books-loader" id="books-loader" aria-hidden="true">

  <div class="book-modal" id="book-modal" hidden>

    <section class="book-modal-panel" role="dialog" aria-modal="true" aria-labelledby="book-modal-title">
      <header class="book-modal-header">

        <button class="book-modal-close" id="book-modal-close" type="button" aria-label="close review">×</button>

      <div class="book-modal-grid">
        <div class="book-modal-cover">
          <img id="book-modal-cover" src="" alt="book cover" loading="lazy">
        </div>
        <div class="book-modal-meta">
          <p class="book-authors" id="book-modal-authors"></p>
          <div class="book-modal-rating" id="book-modal-rating">rating: — / 10</div>
          <div class="book-modal-badges" id="book-modal-badges"></div>
          <p class="book-modal-review" id="book-modal-review">no review added yet.</p>
          <a class="book-modal-link" id="book-modal-link" href="#" target="_blank" rel="noopener">open book page</a>
        </div>
      </div>
    </section>
  </div>

  <script>
    (function () {
      var cfg = window.JOHO_BOOKS_CONFIG || {
        query: 'design engineering art photography architecture film typography',
        maxResults: 40
      };

      var grid = document.getElementById('books-grid');
      var status = document.getElementById('books-status');
      var empty = document.getElementById('books-empty');
      var notes = Array.isArray(window.JOHO_BOOK_NOTES) ? window.JOHO_BOOK_NOTES : [];
      var bookModal = document.getElementById('book-modal');

      var bookModalAuthors = document.getElementById('book-modal-authors');
      var bookModalRating = document.getElementById('book-modal-rating');
      var bookModalReview = document.getElementById('book-modal-review');
      var bookModalLink = document.getElementById('book-modal-link');
      var bookModalClose = document.getElementById('book-modal-close');
      var bookModalBackdrop = document.getElementById('book-modal-backdrop');
      var loader = document.getElementById('books-loader');
      var loaderFill = document.getElementById('books-loader-fill');
      var loaderText = document.getElementById('books-loader-text');
      var controls = document.getElementById('books-controls');
      var closeModalTimer = null;
      var progressTimer = null;
      var visualProgress = 0;
      var currentSort = 'all';
      var curatedItemsCache = [];
      var isCuratedShelfReady = false;
      var CURATED_CACHE_KEY = 'joho_books_curated_cache_v5';
      var CURATED_CACHE_TTL = 1000 * 60 * 60 * 24 * 14;
      var curatedFetchCache = loadCuratedFetchCache();
      var fallbackCover = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450">' +
        '<defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">' +
        '<stop offset="0" stop-color="#20232b"/><stop offset="1" stop-color="#0f1219"/></linearGradient></defs>' +
        '<rect width="300" height="450" fill="url(#g)"/>' +
        '<rect x="22" y="22" width="256" height="406" rx="12" fill="none" stroke="rgba(255,255,255,0.22)"/>' +
        '<text x="150" y="218" text-anchor="middle" fill="#d7dde8" font-family="Helvetica, Arial, sans-serif" font-size="24">book cover</text>' +
        '<text x="150" y="250" text-anchor="middle" fill="#98a4b7" font-family="Helvetica, Arial, sans-serif" font-size="14">unavailable</text>' +
        '</svg>'
      );

      function setProgress(value, label) {
        var safe = Math.max(0, Math.min(100, Math.round(value)));
        visualProgress = safe;
        if (loaderFill) loaderFill.style.width = safe + '%';
        if (loaderText) loaderText.textContent = (label || 'loading shelf...') + ' ' + safe + '%';
      }

      function showLoader(label) {
        if (!loader) return;
        loader.classList.add('show');
        setProgress(0, label || 'loading shelf...');
        if (progressTimer) {
          window.clearInterval(progressTimer);
          progressTimer = null;
        }
        progressTimer = window.setInterval(function () {
          if (visualProgress >= 92) return;
          setProgress(visualProgress + 1, label || 'loading shelf...');
        }, 170);
      }

      function hideLoader(finalLabel) {
        setProgress(100, finalLabel || 'loaded');
        if (progressTimer) {
          window.clearInterval(progressTimer);
          progressTimer = null;
        }
        if (!loader) return;
        window.setTimeout(function () {
          loader.classList.remove('show');
        }, 260);
      }

      function loadCuratedFetchCache() {
        try {
          if (!window.localStorage) return {};
          var raw = window.localStorage.getItem(CURATED_CACHE_KEY);
          if (!raw) return {};
          var parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== 'object') return {};
          return parsed;
        } catch (_e) {
          return {};
        }
      }

      function persistCuratedFetchCache() {
        try {
          if (!window.localStorage) return;
          window.localStorage.setItem(CURATED_CACHE_KEY, JSON.stringify(curatedFetchCache));
        } catch (_e) { }
      }

      function requestJson(url, timeoutMs) {
        if (typeof AbortController !== 'function') {
          return fetch(url).then(function (response) {
            if (!response.ok) throw new Error('request failed');
            return response.json();
          });
        }

        var controller = new AbortController();
        var timer = window.setTimeout(function () {
          controller.abort();
        }, timeoutMs || 7000);

        return fetch(url, { signal: controller.signal })
          .then(function (response) {
            if (!response.ok) throw new Error('request failed');
            return response.json();
          })
          .finally(function () {
            window.clearTimeout(timer);
          });
      }

      function escapeHtml(str) {
        return String(str || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function openLibraryCover(item) {
        var list = coverCandidates(item);
        return list.length ? list[0] : fallbackCover;
      }

      function coverCandidates(item) {
        if (!item) return [fallbackCover];
        var list = [];

        function push(url) {
          if (!url) return;
          var safeUrl = String(url).trim().replace(/^http:/, 'https:');
          if (!safeUrl) return;
          if (list.indexOf(safeUrl) >= 0) return;
          list.push(safeUrl);
        }

        if (item.cover_url) push(item.cover_url);
        if (Array.isArray(item.cover_urls)) {
          item.cover_urls.forEach(push);
        }

        if (item.cover_i) {
          var id = encodeURIComponent(item.cover_i);
          push('https://covers.openlibrary.org/b/id/' + id + '-L.jpg');
          push('https://covers.openlibrary.org/b/id/' + id + '-M.jpg');
          push('https://covers.openlibrary.org/b/id/' + id + '-S.jpg');
        }

        if (Array.isArray(item.isbn) && item.isbn.length) {
          item.isbn.slice(0, 3).forEach(function (rawIsbn) {
            var isbn = encodeURIComponent(rawIsbn);
            if (!isbn) return;
            push('https://images.penguinrandomhouse.com/cover/' + isbn);
            push('https://covers.openlibrary.org/b/isbn/' + isbn + '-L.jpg');
            push('https://covers.openlibrary.org/b/isbn/' + isbn + '-M.jpg');
            push('https://covers.openlibrary.org/b/isbn/' + isbn + '-S.jpg');
            push('https://books.google.com/books/content?vid=ISBN:' + isbn + '&printsec=frontcover&img=1&zoom=2&source=gbs_api');
            push('https://books.google.com/books/content?vid=ISBN:' + isbn + '&printsec=frontcover&img=1&zoom=1&source=gbs_api');
          });
        }

        if (!list.length) push(fallbackCover);
        return list;
      }

      function normalizeKey(value) {
        var text = String(value || '').trim().toLowerCase();
        if (text.normalize) {
          text = text.normalize('NFKD').replace(/[\u0300-\u036f]/g, '');
        }
        return text
          .replace(/[^a-z0-9]+/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function getCuratedCacheKey(entry) {
        if (!entry) return '';
        var title = normalizeKey(entry.title);
        var author = normalizeKey(entry.author);
        if (!title) return '';
        return title + '::' + author;
      }

      function readCachedCuratedEntry(entry) {
        var key = getCuratedCacheKey(entry);
        if (!key) return null;
        var cached = curatedFetchCache[key];
        if (!cached || !cached.item || !cached.ts) return null;
        if ((Date.now() - Number(cached.ts)) > CURATED_CACHE_TTL) {
          delete curatedFetchCache[key];
          return null;
        }
        return cached.item;
      }

      function hasStaleFallbackCacheEntry(entry) {
        var key = getCuratedCacheKey(entry);
        if (!key) return false;
        var cached = curatedFetchCache[key];
        if (!cached || !cached.item || !cached.ts) return false;
        var age = Date.now() - Number(cached.ts);
        if (!Number.isFinite(age)) return false;
        if (age > (1000 * 60 * 60 * 24)) return false;
        return !hasUsableCover(cached.item);
      }

      function writeCachedCuratedEntry(entry, item) {
        var key = getCuratedCacheKey(entry);
        if (!key || !item) return;
        curatedFetchCache[key] = {
          ts: Date.now(),
          item: item
        };

        var keys = Object.keys(curatedFetchCache);
        if (keys.length > 180) {
          keys.sort(function (a, b) {
            var aTs = Number((curatedFetchCache[a] && curatedFetchCache[a].ts) || 0);
            var bTs = Number((curatedFetchCache[b] && curatedFetchCache[b].ts) || 0);
            return bTs - aTs;
          });
          keys.slice(160).forEach(function (dropKey) {
            delete curatedFetchCache[dropKey];
          });
        }

        persistCuratedFetchCache();
      }

      function findBookNote(item) {
        if (!item || !notes.length) return null;
        var titleKey = normalizeKey(item.title);
        var firstAuthor = Array.isArray(item.author_name) && item.author_name.length
          ? normalizeKey(item.author_name[0])
          : '';

        for (var i = 0; i < notes.length; i += 1) {
          var note = notes[i] || {};
          var noteTitle = normalizeKey(note.title);
          var noteAuthor = normalizeKey(note.author || '');
          if (!noteTitle) continue;
          var titleMatched = (titleKey === noteTitle) ||
            (titleKey && noteTitle && (titleKey.indexOf(noteTitle) >= 0 || noteTitle.indexOf(titleKey) >= 0));
          if (!titleMatched) continue;

          if (noteAuthor && firstAuthor) {
            var authorMatched = (noteAuthor === firstAuthor) ||
              (noteAuthor.indexOf(firstAuthor) >= 0 || firstAuthor.indexOf(noteAuthor) >= 0);
            if (!authorMatched) continue;
          }
          return note;
        }
        return null;
      }

      function normalizeStatus(value) {
        var statusValue = String(value || '').trim().toLowerCase();
        if (statusValue === 'finished') return 'finished';
        return 'reading';
      }

      function getBookYear(item, noteMeta) {
        if (noteMeta && noteMeta.year) {
          var noteYear = parseInt(noteMeta.year, 10);
          if (Number.isFinite(noteYear)) return noteYear;
        }
        if (item && item.first_publish_year) {
          var publishYear = parseInt(item.first_publish_year, 10);
          if (Number.isFinite(publishYear)) return publishYear;
        }
        return null;
      }

      function shouldIncludeItemBySort(item) {
        if (currentSort === 'all') return true;
        var noteMeta = findBookNote(item);
        var state = normalizeStatus(noteMeta && noteMeta.status);
        return state === currentSort;
      }

      function updateSortButtons() {
        if (!controls) return;
        controls.querySelectorAll('[data-sort]').forEach(function (button) {
          button.classList.toggle('active', button.getAttribute('data-sort') === currentSort);
        });
      }

      function renderCuratedItemsFromCache() {
        if (!Array.isArray(curatedItemsCache) || !curatedItemsCache.length) {
          grid.innerHTML = '';
          if (controls) controls.setAttribute('hidden', 'hidden');
          status.textContent = 'could not load your curated shelf yet.';
          empty.classList.remove('hidden');
          return;
        }

        var filtered = curatedItemsCache.filter(shouldIncludeItemBySort);
        if (controls) {
          if (isCuratedShelfReady) controls.removeAttribute('hidden');
          else controls.setAttribute('hidden', 'hidden');
        }
        updateSortButtons();

        if (!filtered.length) {
          grid.innerHTML = '';
          status.textContent = currentSort === 'finished'
            ? 'no finished books yet.'
            : 'no currently reading books yet.';
          empty.classList.add('hidden');
          return;
        }

        grid.innerHTML = filtered.map(renderBook).join('');
        wireCoverFallbacks();
        wireBookCardEvents();
        status.textContent = 'loaded ' + filtered.length + ' books (' + currentSort + ')';
        empty.classList.add('hidden');
      }

      function scoreCandidate(entry, doc) {
        var entryTitle = normalizeKey(entry.title);
        var entryAuthor = normalizeKey(entry.author || '');
        var docTitle = normalizeKey(doc && doc.title);
        var docAuthor = normalizeKey(
          Array.isArray(doc && doc.author_name) && doc.author_name.length ? doc.author_name[0] : ''
        );

        var score = 0;

        if (entryTitle && docTitle) {
          if (entryTitle === docTitle) score += 80;
          else if (docTitle.indexOf(entryTitle) >= 0 || entryTitle.indexOf(docTitle) >= 0) score += 50;
        }

        if (entryAuthor && docAuthor) {
          if (entryAuthor === docAuthor) score += 40;
          else if (docAuthor.indexOf(entryAuthor) >= 0 || entryAuthor.indexOf(docAuthor) >= 0) score += 24;
        }

        if (doc && doc.cover_i) score += 8;
        return score;
      }

      function makeFallbackItem(entry) {
        return {
          title: entry.title,
          author_name: entry.author ? [entry.author] : ['Unknown author'],
          key: '',
          cover_i: null,
          cover_url: fallbackCover,
          isbn: []
        };
      }

      function pickBestDoc(entry, docs, allowFallback) {
        if (!Array.isArray(docs) || !docs.length) {
          return allowFallback ? makeFallbackItem(entry) : null;
        }
        var ranked = docs.slice().sort(function (a, b) {
          return scoreCandidate(entry, b) - scoreCandidate(entry, a);
        });
        var top = ranked[0];
        if (!top || scoreCandidate(entry, top) <= 0) {
          return allowFallback ? makeFallbackItem(entry) : null;
        }
        return top;
      }

      function hasUsableCover(item) {
        var list = coverCandidates(item);
        for (var i = 0; i < list.length; i += 1) {
          var url = String(list[i] || '');
          if (!url) continue;
          if (url === fallbackCover) continue;
          if (url.indexOf('data:image/svg+xml') === 0) continue;
          return true;
        }
        return false;
      }

      function mergeCuratedItems(openItem, googleItem) {
        if (!openItem && !googleItem) return null;
        if (!openItem && googleItem) return googleItem;
        if (openItem && !googleItem) return openItem;

        var merged = Object.assign({}, openItem);
        var mergedCoverUrls = coverCandidates(openItem)
          .concat(coverCandidates(googleItem))
          .filter(Boolean);

        var deduped = [];
        mergedCoverUrls.forEach(function (url) {
          if (deduped.indexOf(url) >= 0) return;
          deduped.push(url);
        });

        if (deduped.length) {
          merged.cover_url = deduped[0];
          merged.cover_urls = deduped;
        }

        if (!merged.info_link && googleItem.info_link) {
          merged.info_link = googleItem.info_link;
        }

        return merged;
      }

      function requestJsonWithRetry(url, timeoutMs, retries) {
        var retryCount = Number.isFinite(retries) ? retries : 0;
        return requestJson(url, timeoutMs)
          .catch(function (error) {
            if (retryCount <= 0) throw error;
            return new Promise(function (resolve) {
              window.setTimeout(resolve, 180);
            }).then(function () {
              return requestJsonWithRetry(url, timeoutMs, retryCount - 1);
            });
          });
      }

      function mapGoogleVolumeToItem(volume) {
        var info = (volume && volume.volumeInfo) || {};
        var authors = Array.isArray(info.authors) && info.authors.length ? info.authors : ['Unknown author'];
        var coverUrls = [];

        function pushCover(url) {
          if (!url) return;
          var safeUrl = String(url).replace(/^http:/, 'https:');
          if (coverUrls.indexOf(safeUrl) >= 0) return;
          coverUrls.push(safeUrl);
        }

        if (info.imageLinks) {
          pushCover(info.imageLinks.extraLarge);
          pushCover(info.imageLinks.large);
          pushCover(info.imageLinks.medium);
          pushCover(info.imageLinks.thumbnail);
          pushCover(info.imageLinks.small);
          pushCover(info.imageLinks.smallThumbnail);
        }

        if (volume && volume.id) {
          var volumeId = encodeURIComponent(volume.id);
          pushCover('https://books.google.com/books/content?id=' + volumeId + '&printsec=frontcover&img=1&zoom=2&source=gbs_api');
          pushCover('https://books.google.com/books/content?id=' + volumeId + '&printsec=frontcover&img=1&zoom=1&source=gbs_api');
        }

        return {
          title: info.title || 'Untitled',
          author_name: authors,
          key: '',
          info_link: info.infoLink || '',
          cover_i: null,
          cover_url: coverUrls[0] || fallbackCover,
          cover_urls: coverUrls,
          isbn: []
        };
      }

      function searchOpenLibraryEntry(entry) {
        var endpoint = 'https://openlibrary.org/search.json?title=' + encodeURIComponent(entry.title || '') +
          '&author=' + encodeURIComponent(entry.author || '') +
          '&language=' + encodeURIComponent(cfg.language || 'en') +
          '&limit=12';

        return requestJsonWithRetry(endpoint, 6500, 1)
          .then(function (data) {
            var docs = Array.isArray(data.docs) ? data.docs : [];
            return pickBestDoc(entry, docs, false);
          });
      }

      function searchGoogleEntry(entry) {
        var endpoint = 'https://www.googleapis.com/books/v1/volumes?q=' +
          encodeURIComponent('intitle:' + (entry.title || '') + ' inauthor:' + (entry.author || '')) +
          '&maxResults=6&printType=books';

        return requestJsonWithRetry(endpoint, 6500, 1)
          .then(function (data) {
            var items = Array.isArray(data.items) ? data.items.map(mapGoogleVolumeToItem) : [];
            return pickBestDoc(entry, items, false);
          });
      }

      function fetchCuratedEntry(entry) {
        var cached = readCachedCuratedEntry(entry);
        if (cached && !hasStaleFallbackCacheEntry(entry)) return Promise.resolve(cached);

        return searchOpenLibraryEntry(entry)
          .catch(function () {
            return null;
          })
          .then(function (openItem) {
            if (openItem && hasUsableCover(openItem)) {
              return openItem;
            }

            return searchGoogleEntry(entry)
              .then(function (googleItem) {
                return mergeCuratedItems(openItem, googleItem);
              })
              .catch(function () {
                return openItem;
              });
          })
          .then(function (resolvedItem) {
            var safeItem = resolvedItem || makeFallbackItem(entry);
            writeCachedCuratedEntry(entry, safeItem);
            return safeItem;
          })
          .catch(function () {
            var fallback = makeFallbackItem(entry);
            writeCachedCuratedEntry(entry, fallback);
            return fallback;
          });
      }

      function mapWithConcurrency(items, limit, mapper, onProgress) {
        var list = Array.isArray(items) ? items : [];
        var max = Math.max(1, Number(limit) || 1);
        if (!list.length) return Promise.resolve([]);

        var results = new Array(list.length);
        var nextIndex = 0;
        var completed = 0;

        function runWorker() {
          if (nextIndex >= list.length) return Promise.resolve();
          var index = nextIndex;
          nextIndex += 1;

          return Promise.resolve(mapper(list[index], index))
            .catch(function () {
              return null;
            })
            .then(function (value) {
              results[index] = value;
              completed += 1;
              if (typeof onProgress === 'function') {
                onProgress(completed, list.length, value, index);
              }
              return runWorker();
            });
        }

        var workers = [];
        for (var i = 0; i < Math.min(max, list.length); i += 1) {
          workers.push(runWorker());
        }

        return Promise.all(workers).then(function () {
          return results;
        });
      }

      function wireCoverFallbacks() {
        grid.querySelectorAll('.book-cover').forEach(function (img) {
          var raw = img.getAttribute('data-cover-candidates') || '';
          var candidates = raw ? raw.split('|').filter(Boolean) : [];
          if (!candidates.length) candidates = [fallbackCover];
          img.dataset.coverIndex = img.dataset.coverIndex || '0';

          img.addEventListener('error', function () {
            var current = parseInt(img.dataset.coverIndex || '0', 10);
            if (!Number.isFinite(current)) current = 0;
            var next = current + 1;

            if (next < candidates.length) {
              img.dataset.coverIndex = String(next);
              img.src = candidates[next];
              return;
            }

            if (img.dataset.fallbackApplied === '1') return;
            img.dataset.fallbackApplied = '1';
            img.src = fallbackCover;
          });
        });
      }

      function loadCuratedShelf() {
        isCuratedShelfReady = false;
        if (controls) controls.setAttribute('hidden', 'hidden');
        showLoader('loading shelf...');
        setProgress(8, 'finding books...');
        status.textContent = 'loading curated shelf...';
        mapWithConcurrency(notes, 4, fetchCuratedEntry, function (done, total) {
          var pct = 12 + (done / total) * 80;
          setProgress(pct, 'loading books...');
          status.textContent = 'loading curated shelf... ' + done + '/' + total;
        })
          .then(function (items) {
            var valid = items.filter(Boolean);
            if (!valid.length) {
              hideLoader('done');
              status.textContent = 'could not load your curated shelf yet.';
              empty.classList.remove('hidden');
              return;
            }

            setProgress(16, 'found books...');
            curatedItemsCache = valid.slice();
            renderCuratedItemsFromCache();
            hideLoader('loaded');
            isCuratedShelfReady = true;
            if (controls) controls.removeAttribute('hidden');
            updateSortButtons();
          })
          .catch(function () {
            hideLoader('done');
            status.textContent = 'unable to load curated shelf right now.';
            empty.classList.remove('hidden');
          });
      }

      function finishCloseModal() {
        if (!bookModal) return;
        bookModal.classList.remove('open');
        bookModal.setAttribute('hidden', 'hidden');
      }

      function closeBookModal() {
        if (!bookModal || bookModal.hasAttribute('hidden')) return;
        if (closeModalTimer) {
          window.clearTimeout(closeModalTimer);
          closeModalTimer = null;
        }
        bookModal.classList.remove('open');
        closeModalTimer = window.setTimeout(function () {
          finishCloseModal();
          closeModalTimer = null;
        }, 320);
      }

      function openBookModal(item) {
        if (!bookModal || !item) return;
        var title = item.title || 'untitled';
        var authors = Array.isArray(item.author_name) ? item.author_name.join(', ') : 'unknown author';
        var coverList = coverCandidates(item);
        var cover = coverList.length ? coverList[0] : fallbackCover;
        var infoLink = item.info_link || (item.key ? ('https://openlibrary.org' + item.key) : '#');
        var noteMeta = findBookNote(item);
        var statusValue = normalizeStatus(noteMeta && noteMeta.status);
        var yearValue = getBookYear(item, noteMeta);
        var badgeHtml = '';

        bookModalTitle.textContent = title;
        bookModalCover.src = cover;
        bookModalCover.alt = title + ' cover';
        bookModalCover.dataset.coverIndex = '0';
        bookModalCover.onerror = function () {
          var current = parseInt(bookModalCover.dataset.coverIndex || '0', 10);
          if (!Number.isFinite(current)) current = 0;
          var next = current + 1;
          if (next < coverList.length) {
            bookModalCover.dataset.coverIndex = String(next);
            bookModalCover.src = coverList[next];
            return;
          }
          bookModalCover.onerror = null;
          bookModalCover.src = fallbackCover;
        };
        bookModalAuthors.textContent = authors;
        bookModalLink.href = infoLink;

        if (statusValue === 'finished') {
          badgeHtml += '<span class="book-modal-badge" data-state="finished">finished</span>';
        } else {
          badgeHtml += '<span class="book-modal-badge" data-state="reading">reading</span>';
        }
        if (yearValue) {
          badgeHtml += '<span class="book-modal-badge">year: ' + yearValue + '</span>';
        }
        var badgesEl = document.getElementById('book-modal-badges');
        if (badgesEl) badgesEl.innerHTML = badgeHtml;

        if (noteMeta && Number.isFinite(Number(noteMeta.rating)) && Number(noteMeta.rating) > 0) {
          bookModalRating.textContent = 'rating: ' + Number(noteMeta.rating).toFixed(1) + ' / 10';
        } else {
          bookModalRating.textContent = 'rating: — / 10';
        }

        var reviewText = noteMeta && noteMeta.review != null ? String(noteMeta.review).trim() : '';
        if (reviewText) {
          bookModalReview.textContent = reviewText;
        } else {
          bookModalReview.textContent = 'no review added yet.';
        }

        if (closeModalTimer) {
          window.clearTimeout(closeModalTimer);
          closeModalTimer = null;
        }
        bookModal.removeAttribute('hidden');
        window.requestAnimationFrame(function () {
          bookModal.classList.add('open');
        });
      }

      function renderBook(item) {
        var title = item.title || 'Untitled';
        var authors = Array.isArray(item.author_name) ? item.author_name.join(', ') : 'Unknown author';
        var cover = openLibraryCover(item);
        var coverList = coverCandidates(item);
        var noteMeta = findBookNote(item);
        var statusValue = normalizeStatus(noteMeta && noteMeta.status);
        var statusClass = statusValue === 'finished' ? 'book-status-finished' : 'book-status-reading';
        var chips = [];

        chips.push(statusValue);

        return [
          '<button class="book-card" type="button" data-book-card data-book-json="', escapeHtml(JSON.stringify(item)), '">',
          '<div class="book-cover-wrap">',
          '<img class="book-cover" src="', escapeHtml(cover), '" alt="', escapeHtml(title), ' cover" loading="lazy" decoding="async" data-cover-candidates="', escapeHtml(coverList.join('|')), '" data-cover-index="0">',
          '</div>',
          '<div class="book-plank" aria-hidden="true"></div>',
          '<h3 class="book-title">', escapeHtml(title), '</h3>',
          '<p class="book-authors">', escapeHtml(authors), '</p>',
          '<p class="book-authors ', statusClass, '" style="margin-top:0.28rem;">', escapeHtml(chips.join(' • ')), '</p>',
          '</button>'
        ].join('');
      }

      function wireBookCardEvents() {
        grid.querySelectorAll('[data-book-card]').forEach(function (card) {
          card.addEventListener('click', function () {
            var raw = card.getAttribute('data-book-json') || '';
            if (!raw) return;
            try {
              openBookModal(JSON.parse(raw));
            } catch (_e) { }
          });
        });
      }

      function setMissingConfigMessage() {
        status.textContent = 'add an open library query to load this shelf';
        empty.classList.remove('hidden');
      }

      function fetchPublicConfig() {
        var workerBase = (window.CLOUDFLARE_WORKER_URL || '').trim().replace(/\/$/, '');
        if (!workerBase) return Promise.resolve(cfg);

        return requestJson(workerBase + '/public-config', 5000)
          .then(function (data) {
            if (data && data.openLibraryQuery && !cfg.query) {
              cfg.query = data.openLibraryQuery;
            }
            return cfg;
          })
          .catch(function () {
            return cfg;
          });
      }

      function loadShelf() {
        if (notes.length) {
          loadCuratedShelf();
          return;
        }

        if (!cfg.query) {
          setMissingConfigMessage();
          return;
        }

        showLoader('loading shelf...');
        setProgress(12, 'searching open library...');
        var endpoint = 'https://openlibrary.org/search.json?q=' + encodeURIComponent(cfg.query) +
          '&language=' + encodeURIComponent(cfg.language || 'en') +
          '&limit=' + encodeURIComponent(cfg.maxResults || 40) +
          '&sort=editions';

        requestJson(endpoint, 7000)
          .then(function (data) {
            var items = Array.isArray(data.docs) ? data.docs : [];
            if (!items.length) {
              hideLoader('done');
              status.textContent = 'shelf loaded, but no books returned';
              empty.classList.remove('hidden');
              return;
            }

            setProgress(24, 'found books...');
            grid.innerHTML = items.map(renderBook).join('');
            wireCoverFallbacks();
            wireBookCardEvents();
            status.textContent = 'loaded ' + items.length + ' books';
            empty.classList.add('hidden');
            hideLoader('loaded');
          })
          .catch(function () {
            hideLoader('done');
            status.textContent = 'unable to load open library shelf';
            empty.classList.remove('hidden');
          });
      }

      if (bookModalClose) {
        bookModalClose.addEventListener('click', closeBookModal);
      }

      if (bookModalBackdrop) {
        bookModalBackdrop.addEventListener('click', closeBookModal);
      }

      if (controls) {
        controls.addEventListener('click', function (event) {
          var button = event.target.closest('[data-sort]');
          if (!button) return;
          currentSort = button.getAttribute('data-sort') || 'all';
          renderCuratedItemsFromCache();
        });
      }

      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') {
          closeBookModal();
        }
      });

      fetchPublicConfig().then(loadShelf);
    })();
  </script>

  <script src="scripts/page-transitions.js"></script>
  <script src="scripts/dot-grid.js"></script>
  <script src="scripts/clocks.js"></script>
</body>

</html>
