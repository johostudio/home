<html lang="en">

<head>

  <style>
    body {
      background: #000;
      color: #e6eef6;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      margin: 0;
      overflow: hidden;
    }

    #graph-container {
      position: absolute;
      inset: 0;
      z-index: 10;
      cursor: grab;
    }

    #panel-backdrop {
      position: fixed;
      inset: 0;
      z-index: 46;
      border: 0;
      background: rgba(4, 6, 12, 0.22);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.24s ease;
    }

    #panel-backdrop.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #graph-container:active {
      cursor: grabbing;
    }

    #info-panel {
      position: absolute;
      top: 50%;
      right: clamp(1rem, 3vw, 2rem);
      transform: translateY(-50%) translateX(14px) scale(0.98);
      width: min(420px, calc(100vw - 2.2rem));
      max-height: 76vh;
      overflow-y: auto;
      background: rgba(6, 8, 16, 0.92);
      border: 1px solid rgba(192, 132, 252, 0.26);
      border-radius: 10px;
      padding: 1rem 1rem 0.95rem;
      z-index: 60;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.24s ease, transform 0.24s ease;
      cursor: default;
      will-change: opacity, transform;
    }

    #info-panel.panel-has-image {
      width: min(350px, calc(100vw - 2.2rem));
      max-height: 70vh;
    }

    #info-panel.dragging {
      cursor: grabbing;
      user-select: none;
    }

    .panel-drag-handle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: -0.15rem 0 0.6rem;
      cursor: grab;
      user-select: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 0.35rem;
      touch-action: none;
    }

    .panel-drag-title {
      font-size: 0.63rem;
      color: rgba(230, 238, 246, 0.48);
      letter-spacing: -0.01em;
      text-transform: lowercase;
      font-weight: 400;
    }

    #info-panel.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(-50%) translateX(0) scale(1);
    }

    #info-panel.closing {
      opacity: 0;
      pointer-events: none;
      transform: translateY(-50%) translateX(14px) scale(0.98);
    }

    #info-panel h3 {
      font-size: clamp(1.45rem, 2.9vw, 1.7rem);
      font-weight: 400;
      color: #e6eef6;
      margin-top: 0;
      margin-bottom: 0.45rem;
      letter-spacing: -0.075em;
    }

    #info-panel .date {
      font-size: 0.92rem;
      letter-spacing: 0;
      color: #c084fc;
      margin-bottom: 0.5rem;
      display: block;
      font-weight: 500;
    }

    #info-panel .now-playing {
      font-size: 0.74rem;
      color: rgba(230, 238, 246, 0.75);
      margin-bottom: 0.8rem;
      line-height: 1.5;
      text-transform: lowercase;
    }

    #info-panel .now-playing a {
      color: #c084fc;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
      transition: color 0.2s ease;
    }

    #info-panel .now-playing a:hover {
      color: #e5c2ff;
    }

    #info-panel p {
      font-size: clamp(0.84rem, 1.2vw, 0.96rem);
      line-height: 1.45;
      letter-spacing: -0.03em;
      color: rgba(230, 238, 246, 0.83);
      margin: 0;
      font-weight: 400;
    }

    #info-panel .panel-close {
      margin-top: 0;
      border: 0;
      background: transparent;
      color: rgba(230, 238, 246, 0.66);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0;
      line-height: 1;
      cursor: pointer;
      padding: 2px 4px;
      text-transform: lowercase;
      border-radius: 4px;
    }

    #info-panel .panel-close:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    #panel-content {
      white-space: pre-line;
    }

    #info-panel,
    #panel-content {
      scrollbar-width: thin;
      scrollbar-color: rgba(192, 132, 252, 0.62) rgba(255, 255, 255, 0.08);
    }

    #info-panel::-webkit-scrollbar,
    #panel-content::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    #info-panel::-webkit-scrollbar-track,
    #panel-content::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 999px;
    }

    #info-panel::-webkit-scrollbar-thumb,
    #panel-content::-webkit-scrollbar-thumb {
      background: rgba(192, 132, 252, 0.62);
      border: 2px solid rgba(8, 12, 18, 0.9);
      border-radius: 999px;
    }

    .panel-node-image {
      width: min(200px, 100%);
      border-radius: 6px;
      margin: 0 auto 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      object-fit: cover;
      aspect-ratio: 4 / 3;
      display: block;
    }

    @media (max-width: 760px) {
      #info-panel {
        right: 1rem;
        left: 1rem;
        width: auto;
        top: auto;
        bottom: 1rem;
        transform: translateY(12px) scale(0.98);
        max-height: 56vh;
      }

      #info-panel.visible {
        transform: translateY(0) scale(1);
      }

      #info-panel.closing {
        transform: translateY(12px) scale(0.98);
      }

      #info-panel.panel-has-image {
        width: auto;
        max-height: 56vh;
      }

      #info-panel h3 {
        font-size: 1.2rem;
      }

      #info-panel p {
        font-size: 0.92rem;
      }
    }

    .archive-footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 12;
      padding: 0.1rem 0 0.9rem;
      pointer-events: none;
    }
  </style>

    // Initialize the Force Graph
    const Graph = ForceGraph()
      (document.getElementById('graph-container'))
      .graphData(gData)
      .backgroundColor('rgba(0,0,0,0)')
      .nodeColor(node => {
        if (node.group === 1) return '#c084fc';
        if (node.group === 2) return '#e6eef6';
        if (node.group === 3) return '#818cf8';
        return '#9ca3af';
      })
      .nodeRelSize(1.65)
      .linkColor(() => 'rgba(255,255,255,0.15)')
      .linkWidth(1.5)
      .nodeLabel(function (node) {
        return '<div style="font-family:Helvetica,Arial,sans-serif;font-size:9px;font-weight:400;letter-spacing:-0.04em;line-height:1.15;padding:3px 5px;border:1px solid rgba(192,132,252,0.25);background:rgba(8,10,18,0.92);border-radius:6px;color:#e6eef6;text-transform:lowercase;">' + node.name + '</div>';
      })
      .nodeCanvasObject((node, ctx, globalScale) => {
        if (node.img) {
          const size = node.val || 12;
          if (!node.imgObj) {
            node.imgObj = new Image();
            node.imgObj.src = node.img;
          }
          ctx.save();
          ctx.beginPath();
          ctx.arc(node.x, node.y, size / 2, 0, 2 * Math.PI, false);
          ctx.clip();
          try {
            ctx.drawImage(node.imgObj, node.x - size / 2, node.y - size / 2, size, size);
          } catch (e) { }
          ctx.restore();
          ctx.beginPath();
          ctx.arc(node.x, node.y, size / 2, 0, 2 * Math.PI, false);
          ctx.strokeStyle = '#c084fc';
          ctx.lineWidth = 1.5 / globalScale;
          ctx.stroke();
        } else {
          const size = node.val ? Math.sqrt(node.val) * 2 : 6;
          ctx.beginPath();
          ctx.arc(node.x, node.y, size, 0, 2 * Math.PI);
          let color = '#9ca3af';
          if (node.group === 1) color = '#c084fc';
          if (node.group === 2) color = '#e6eef6';
          if (node.group === 3) color = '#818cf8';
          ctx.fillStyle = color;
          ctx.fill();
        }
      })
      .onNodeClick(node => {
        // Open info panel
        const panel = document.getElementById('info-panel');
        const backdrop = document.getElementById('panel-backdrop');
        document.getElementById('panel-title').innerText = node.name;
        document.getElementById('panel-date').innerText = node.date || '';
        var nowPlaying = document.getElementById('panel-now-playing');
        var nowPlayingText = node.nowPlaying || 'add a song here';
        if (node.nowPlayingUrl) {
          nowPlaying.innerHTML = 'now playing: <a href="' + node.nowPlayingUrl + '" target="_blank" rel="noopener">' + nowPlayingText + '</a>';
        } else {
          nowPlaying.textContent = 'now playing: ' + nowPlayingText;
        }

        let html = (node.content || '').replace(/\n/g, '<br/>');
        if (node.img) {
          html = `<img src="${node.img}" class="panel-node-image" loading="lazy" decoding="async" alt="node reference">` + html;
          panel.classList.add('panel-has-image');
        } else {
          panel.classList.remove('panel-has-image');
        }
        document.getElementById('panel-content').innerHTML = html;

        panel.classList.remove('closing');
        panel.classList.add('visible');
        if (backdrop) backdrop.classList.add('visible');
        panel.style.left = '';
        panel.style.top = '';
        panel.style.right = 'clamp(1rem, 3vw, 2rem)';
        panel.style.bottom = '';
        panel.style.transform = 'translateY(-50%)';

        // Center chart on node
        Graph.centerAt(node.x, node.y, 1000);
        Graph.zoom(4.2, 1600);
      });

    (function () {
      var panel = document.getElementById('info-panel');
      var backdrop = document.getElementById('panel-backdrop');
      var handle = document.getElementById('panel-drag-handle');
      var closeBtn = document.getElementById('panel-close-btn');
      var dragging = false;
      var closeTimer = null;
      var startX = 0;
      var startY = 0;
      var panelX = 0;
      var panelY = 0;

      function closePanel() {
        panel.classList.remove('visible');
        panel.classList.add('closing');
        if (backdrop) backdrop.classList.remove('visible');

        if (closeTimer) window.clearTimeout(closeTimer);
        closeTimer = window.setTimeout(function () {
          panel.classList.remove('closing');
          closeTimer = null;
        }, 240);
      }

      closeBtn.addEventListener('click', function (event) {
        event.stopPropagation();
        closePanel();
      });

      if (backdrop) {
        backdrop.addEventListener('click', function () {
          closePanel();
        });
      }

      handle.addEventListener('mousedown', function (event) {
        if (event.target === closeBtn) return;
        dragging = true;
        panel.classList.add('dragging');
        var rect = panel.getBoundingClientRect();
        panelX = rect.left;
        panelY = rect.top;
        startX = event.clientX;
        startY = event.clientY;
        panel.style.left = panelX + 'px';
        panel.style.top = panelY + 'px';
        panel.style.right = 'auto';
        panel.style.bottom = 'auto';
        panel.style.transform = 'none';
        event.preventDefault();
      });

      handle.addEventListener('touchstart', function (event) {
        if (event.target === closeBtn) return;
        var touch = event.touches && event.touches[0];
        if (!touch) return;
        dragging = true;
        panel.classList.add('dragging');
        var rect = panel.getBoundingClientRect();
        panelX = rect.left;
        panelY = rect.top;
        startX = touch.clientX;
        startY = touch.clientY;
        panel.style.left = panelX + 'px';
        panel.style.top = panelY + 'px';
        panel.style.right = 'auto';
        panel.style.bottom = 'auto';
        panel.style.transform = 'none';
        event.preventDefault();
      }, { passive: false });

      window.addEventListener('mousemove', function (event) {
        if (!dragging) return;
        var nx = panelX + (event.clientX - startX);
        var ny = panelY + (event.clientY - startY);
        var maxX = window.innerWidth - panel.offsetWidth - 8;
        var maxY = window.innerHeight - panel.offsetHeight - 8;
        nx = Math.max(8, Math.min(maxX, nx));
        ny = Math.max(8, Math.min(maxY, ny));
        panel.style.left = nx + 'px';
        panel.style.top = ny + 'px';
      });

      window.addEventListener('touchmove', function (event) {
        if (!dragging) return;
        var touch = event.touches && event.touches[0];
        if (!touch) return;
        var nx = panelX + (touch.clientX - startX);
        var ny = panelY + (touch.clientY - startY);
        var maxX = window.innerWidth - panel.offsetWidth - 8;
        var maxY = window.innerHeight - panel.offsetHeight - 8;
        nx = Math.max(8, Math.min(maxX, nx));
        ny = Math.max(8, Math.min(maxY, ny));
        panel.style.left = nx + 'px';
        panel.style.top = ny + 'px';
        event.preventDefault();
      }, { passive: false });

      window.addEventListener('mouseup', function () {
        if (!dragging) return;
        dragging = false;
        panel.classList.remove('dragging');
      });

      window.addEventListener('touchend', function () {
        if (!dragging) return;
        dragging = false;
        panel.classList.remove('dragging');
      });

      document.addEventListener('keydown', function (event) {
        if (event.key !== 'Escape') return;
        if (!panel.classList.contains('visible')) return;
        closePanel();
      });
    })();

    // Make it responsive
    window.addEventListener('resize', () => {
      Graph.width(window.innerWidth).height(window.innerHeight);
    });
  </script>

  <script src="scripts/page-transitions.js"></script>
  <script src="scripts/dot-grid.js"></script>
  <script src="scripts/clocks.js"></script>
</body>

</html>
