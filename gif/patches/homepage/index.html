<!DOCTYPE html>
<html lang="en">
<head>
    <title>tbd page - ver two</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: Helvetica, Arial, sans-serif;
            overflow: hidden; /* disable scrolling / rubberband effect on mobile */
            height:100vh;
        }

        canvas {
            display: block;
            position: absolute;
            outline:0;
        }

        * {
            /* disable on touch highlights of html elements, especially on mobile! */
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

    </style>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1">
    <meta itemprop="name" content="tbd page - ver two">
    <meta itemprop="description" content="made with cables">
    <meta itemprop="image" content="screenshot.png">
    <meta name="description" content="made with cables"/>

</head>
<body>
    <div id="canvascontainer" style="width:100%;height: 100%;overflow: hidden;">
        <canvas id="glcanvas" width="100vw" height="100vh" tabindex="1"></canvas>
    </div>

    
    <script type="text/javascript" src="js/patch.js"></script>
    

    <script type="text/javascript">

        function showError(initiator,...args)
        {
            window.__cablesLastError = "[" + initiator + "] " + args.join(" ");
            CABLES.logErrorConsole("[" + initiator + "]", ...args);
        }

        function patchInitialized(patch)
        {
            // You can now access the patch object (patch), register variable watchers and so on
        }

        function patchFinishedLoading(patch)
        {
            // The patch is ready now, all assets have been loaded
        }

        function initPatchSafe()
        {
            if (window.__cablesPatchStarted) return;
            if (!window.CABLES || !window.CABLES.Patch || !window.CABLES.exportedPatch) return;

            window.__cablesPatchInitTried = true;

            CABLES.patch = new CABLES.Patch({
                patch: CABLES.exportedPatch,
                "prefixAssetPath": "",
                "assetPath": "assets/",
                "jsPath": "js/",
                "glCanvasId": "glcanvas",
                "glCanvasResizeToWindow": true,
                "onError": showError,
                "onPatchLoaded": patchInitialized,
                "onFinishedLoading": patchFinishedLoading,
                "canvas": {"alpha":true, "premultipliedAlpha":true }
            });

            window.__cablesPatchStarted = !!(CABLES && CABLES.patch);
        }

        document.addEventListener("CABLES.jsLoaded", initPatchSafe);
        window.addEventListener("load", initPatchSafe);

        var __tries = 0;
        var __patchTimer = setInterval(function () {
            __tries++;
            initPatchSafe();
            if (window.__cablesPatchStarted || __tries > 80) {
                clearInterval(__patchTimer);
            }
        }, 50);

        // disable rubberband effect on mobile devices
        document.getElementById('glcanvas').addEventListener('touchmove', (e)=>{ e.preventDefault(); }, false);
    </script>
</body>
</html>
