<!doctype html>
<html lang="en" style="background:#000;">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>archives</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="stylesheet" href="styles/tailwind-prod.css">
  <link rel="stylesheet" href="styles/dot-grid.css">
  <link rel="stylesheet" href="styles/clocks.css">
  <!-- GSAP for project gallery -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    /* ── Base ── */
    html,
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #e6eef6;
      overflow-x: hidden;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }


    /* ── Archives content ── */
    #archives-content {
      display: block;
    }

    #gardens-section {
      position: relative;
      z-index: 10;
      padding: 9.5rem 1.5rem 3rem;
      max-width: 980px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      pointer-events: auto;
    }

    .archives-title {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      text-align: center;
    }

    .archives-title h1 {
      margin: 0;
      font-size: clamp(2.45rem, 5.1vw, 3.85rem);
      font-weight: 400;
      letter-spacing: -0.09em;
      color: #f2f6ff;
      text-transform: lowercase;
      line-height: 0.94;
    }

    .archives-title p {
      margin: 0.55rem 0 0;
      font-size: 0.74rem;
      letter-spacing: -0.01em;
      text-transform: lowercase;
      color: rgba(190, 198, 214, 0.52);
    }

    .archives-links {
      width: min(820px, 100%);
      display: grid;
      grid-template-columns: repeat(3, minmax(130px, 1fr));
      gap: clamp(1.2rem, 5vw, 4rem);
      align-items: start;
      justify-items: center;
    }

    .archives-link {
      text-decoration: none;
      color: rgba(230, 238, 246, 0.72);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      text-align: center;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .archives-link svg {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 10px rgba(192, 132, 252, 0.15));
      transition: transform 0.22s ease;
    }

    .archives-link .sketch-icon {
      stroke-width: 2.15;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 2.6 1.8;
      transform: rotate(-1.25deg);
      opacity: 0.92;
    }

    .archives-link .sketch-icon path,
    .archives-link .sketch-icon line,
    .archives-link .sketch-icon circle,
    .archives-link .sketch-icon rect {
      vector-effect: non-scaling-stroke;
    }

    .archives-link:nth-child(2) .sketch-icon {
      transform: rotate(1.4deg);
      stroke-dasharray: 2.2 1.7;
    }

    .archives-link:nth-child(3) .sketch-icon {
      transform: rotate(-0.7deg);
      stroke-dasharray: 2.9 1.7;
    }

    .archives-link-label {
      font-size: 1.02rem;
      letter-spacing: -0.042em;
      font-weight: 400;
      text-transform: lowercase;
      line-height: 1.35;
      color: rgba(230, 238, 246, 0.88);
    }

    .archives-link:hover,
    .archives-link:focus-visible {
      color: #c084fc;
      transform: translateY(-2px);
      outline: none;
    }

    .archives-link:hover svg,
    .archives-link:focus-visible svg {
      transform: scale(1.12);
    }


    @media (max-width: 640px) {
      #gardens-section {
        padding-top: 8rem;
      }

      .archives-links {
        grid-template-columns: 1fr;
        gap: 1.35rem;
      }

      .archives-link {
        gap: 0.5rem;
      }
    }

    /* ── Shared fixed nav overlay (over both sections) ── */
    #archives-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 1.2rem;
      pointer-events: none;
    }

    #archives-nav a.site-logo {
      pointer-events: auto;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: -0.13em;
      color: #e6eef6;
    }

    #archives-nav a.site-logo img {
      height: 1em;
      width: auto;
    }

    #archives-nav .site-nav {
      margin-top: 0.35rem;
      display: flex;
      gap: 1.5rem;
      opacity: 0.65;
      pointer-events: auto;
    }

    #archives-nav .site-nav a {
      font-size: 0.75rem;
      color: #c084fc;
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: color .18s;
    }

    #archives-nav .site-nav a:hover {
      color: #e9d7ff;
    }

    #archives-nav .site-nav a.current {
      color: #fff;
      opacity: 1;
    }

    /* ── Section 1: Sphere ── */
    #sphere-section {
      position: relative;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    #cables-wrap {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 56px;
      /* leave room for scroll bar */
    }

    #cables-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #000;
    }

    /* Scroll strip at bottom of sphere */
    #scroll-strip {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(6px);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      cursor: pointer;
      transition: background .2s;
    }

    #scroll-strip:hover {
      background: rgba(192, 132, 252, 0.08);
    }

    #scroll-strip span {
      font-size: 0.72rem;
      letter-spacing: -0.02em;
      text-transform: lowercase;
      font-weight: 400;
      color: rgba(200, 180, 255, 0.55);
    }

    .scroll-arrow {
      width: 16px;
      height: 16px;
      border-bottom: 1.5px solid rgba(192, 132, 252, 0.5);
      border-right: 1.5px solid rgba(192, 132, 252, 0.5);
      transform: rotate(45deg) translateY(-4px);
      animation: bobDown 1.4s ease-in-out infinite;
    }

    @keyframes bobDown {

      0%,
      100% {
        transform: rotate(45deg) translateY(-4px);
        opacity: 0.55;
      }

      50% {
        transform: rotate(45deg) translateY(2px);
        opacity: 1;
      }
    }

    /* ── Section 2: Project Gallery ── */
    #gallery-section {
      background: transparent;
      min-height: 100vh;
      position: relative;
    }

    .gallery-content {
      position: relative;
      z-index: 2;
      padding: 7rem 0 5rem;
    }

    .gallery-header {
      text-align: center;
      margin-bottom: 3.5rem;
    }

    .gallery-header p {
      font-size: 0.72rem;
      letter-spacing: -0.01em;
      text-transform: lowercase;
      color: rgba(190, 198, 214, 0.52);
      margin-bottom: 0.5rem;
      font-weight: 400;
    }

    .gallery-header h2 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 400;
      letter-spacing: -0.09em;
      color: #e6eef6;
      line-height: 0.95;
      text-transform: lowercase;
    }

    /* Carousel */
    .carousel-outer {
      position: relative;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 4rem;
    }

    .carousel-viewport {
      overflow: hidden;
      border-radius: 2px;
    }

    .carousel-track {
      display: flex;
      will-change: transform;
    }

    /* Project card */
    .proj-card {
      min-width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5rem;
      align-items: center;
      padding: 2.5rem;
      background: #0d0d0d;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 2px;
    }

    @media (max-width: 640px) {
      .proj-card {
        grid-template-columns: 1fr;
        gap: 1.5rem;
        padding: 1.5rem;
      }
    }

    .proj-img-wrap {
      aspect-ratio: 4/3;
      overflow: hidden;
      border-radius: 2px;
      background: #111;
    }

    .proj-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease;
    }

    .proj-card:hover .proj-img-wrap img {
      transform: scale(1.04);
    }

    .proj-info {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .proj-num {
      font-size: 0.65rem;
      letter-spacing: -0.01em;
      text-transform: lowercase;
      color: rgba(192, 132, 252, 0.4);
      font-weight: 400;
    }

    .proj-title {
      font-size: clamp(1.3rem, 3vw, 1.8rem);
      font-weight: 400;
      letter-spacing: -0.08em;
      color: #e6eef6;
      line-height: 1.1;
      text-transform: lowercase;
    }

    .proj-intent {
      font-size: 0.82rem;
      color: rgba(230, 238, 246, 0.55);
      line-height: 1.6;
    }

    .proj-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .stack-tag {
      font-size: 0.62rem;
      letter-spacing: -0.01em;
      text-transform: lowercase;
      padding: 0.25rem 0.6rem;
      border: 1px solid rgba(192, 132, 252, 0.22);
      border-radius: 2px;
      color: rgba(192, 132, 252, 0.65);
      font-weight: 400;
    }

    .proj-links {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .proj-links a {
      font-size: 0.72rem;
      letter-spacing: -0.01em;
      text-transform: lowercase;
      color: rgba(192, 132, 252, 0.65);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      transition: color .18s;
      font-weight: 400;
    }

    .proj-links a:hover {
      color: #c084fc;
    }

    .proj-links svg {
      flex-shrink: 0;
    }

    /* Nav arrows */
    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      border: 1px solid rgba(192, 132, 252, 0.2);
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      color: rgba(192, 132, 252, 0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color .18s, color .18s;
      z-index: 5;
    }

    .carousel-btn:hover {
      border-color: #c084fc;
      color: #c084fc;
    }

    #btn-prev {
      left: 0;
    }

    #btn-next {
      right: 0;
    }

    /* Dots */
    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 2rem;
    }

    .carousel-dots .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(192, 132, 252, 0.2);
      cursor: pointer;
      transition: background .2s;
    }

    .carousel-dots .dot.active {
      background: #c084fc;
    }

    /* back btn */
    .back-btn {
      z-index: 110;
    }
  </style>
</head>

<body>
  <!-- Dot Grid Background (covers whole page incl. password gate) -->
  <div class="dot-grid-wrapper"></div>
  <!-- Self-injecting site header -->
  <script src="scripts/site-header.js"></script>

  <!-- Back button -->
  <a href="/" class="back-btn" style="position:fixed;top:1rem;left:1rem;z-index:9998;">← back</a>

  <!-- Archives Content -->
  <div id="archives-content">

    <!-- ── Section 1: Minimal Archives Nav ── -->
    <div id="gardens-section">
      <div class="archives-title">
        <h1>archives</h1>
        <p>joho's archives</p>
      </div>
      <div class="archives-links">
        <a href="scrambled.html" class="archives-link" title="a scrambled mind">
          <svg class="sketch-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12.5c1.1-1.8 2.6-2.8 4.6-2.8 1.4 0 2.8.6 4 1.6 1.5 1.2 2.8 1.8 4.2 1.8 1.2 0 2.4-.4 3.2-1.2"></path><path d="M4.8 15.6c1.1-1.1 2.4-1.7 3.9-1.7 1.4 0 2.8.5 4.2 1.5 1.7 1.3 3.1 1.9 4.5 1.9 1 0 1.9-.2 2.8-.8"></path><circle cx="7" cy="7" r="1.4"></circle><circle cx="12" cy="6" r="1.1"></circle><circle cx="17" cy="7.4" r="1.3"></circle></svg>
          <span class="archives-link-label">a scrambled mind</span>
        </a>

        <a href="bookshelf.html" class="archives-link" title="a cluttered shelf">
          <svg class="sketch-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.2 5.2h3.1v13.4H4.2z"></path><path d="M8.6 4.3h3.7v14.3H8.6z"></path><path d="M13.5 5.6H18v13H13.5z"></path><path d="M4 19.6h16"></path><line x1="10.5" y1="7" x2="10.5" y2="15"></line></svg>
          <span class="archives-link-label">a cluttered shelf</span>
        </a>

        <a href="atlas.html" class="archives-link" title="a colourful atlas">
          <svg class="sketch-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3.4 8.2l6.5-2.1 4.3 1.6 6.4-1.8v10.1l-6.4 2.1-4.3-1.6-6.5 1.8z"></path><path d="M9.9 6.1v10.2"></path><path d="M14.2 7.7v10.2"></path><path d="M3.4 12.2l6.5-1.8 4.3 1.4 6.4-1.7"></path></svg>
          <span class="archives-link-label">a colourful atlas</span>
        </a>
      </div>
    </div>

    <!-- ── Section 2: cables.gl Sphere ── -->
    <div id="sphere-section" style="position:relative; height:100vh;">
      <div id="cables-wrap" style="position:absolute; top:0; left:0; right:0; bottom:0;">
        <iframe id="archives-cables-frame" src="https://cables.gl/view/5YDGDb" loading="eager" allow="autoplay; fullscreen" allowfullscreen
          title="cloud — cables.gl" style="width:100%; height:100%; border:none; display:block; background:transparent;"></iframe>
      </div>
    </div>

  </div><!-- /#archives-content -->

  <script src="scripts/page-transitions.js"></script>
  <script src="scripts/dot-grid.js"></script>
  <script src="scripts/clocks.js"></script>
</body>
</html>
